<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MilkyPot — Portal do Colaborador</title>
<meta http-equiv="refresh" content="0;url=/colaborador/">
<link rel="canonical" href="/colaborador/">
<style>
body { font-family: 'Nunito', sans-serif; background: #16A34A; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
.box { max-width: 360px; }
h1 { font-size: 1.4rem; margin: 0 0 8px; }
p { font-size: .92rem; opacity: .92; margin: 0 0 16px; }
a { color: #fff; background: rgba(255,255,255,.2); padding: 12px 22px; border-radius: 10px; text-decoration: none; font-weight: 700; display: inline-block; }
</style>
</head>
<body>
<div class="box">
    <div style="font-size:3rem;margin-bottom:10px">⏰</div>
    <h1>Portal mudou de endereço</h1>
    <p>Agora se chama <strong>Portal do Colaborador</strong>. Redirecionando…</p>
    <a href="/colaborador/">Abrir agora →</a>
</div>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) {
            if (r.scope && r.scope.indexOf('/funcionario/') !== -1) r.unregister();
        });
    });
}
if ('caches' in window) {
    caches.keys().then(function(names) {
        names.forEach(function(n) {
            if (n.indexOf('funcionario') !== -1) caches.delete(n);
        });
    });
}
setTimeout(function() {
    var qs = window.location.search || '';
    window.location.replace('/colaborador/' + qs);
}, 600);
</script>
</body>
</html>
