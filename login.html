<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyPot - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Firebase CDN resource hints -->
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com">
    <link rel="dns-prefetch" href="//firestore.googleapis.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/shared-panel.css">
    <link rel="stylesheet" href="css/mobile-app.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#42A5F5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MilkyPot">
    <link rel="apple-touch-icon" href="images/logo-milkypot.png">
</head>
<body class="login-page">
    <div class="login-card">
        <img src="images/logo-milkypot.png" alt="MilkyPot" class="login-logo" style="border-radius:16px">
        <h1 class="login-title" data-i18n="auth.login_title">Acesso ao Sistema</h1>
        <p class="login-subtitle" data-i18n="auth.login_subtitle">Painel Administrativo & Franqueados</p>

        <div class="login-error" id="loginError"></div>

        <!-- Google Sign-In Button (Firebase) -->
        <button type="button" class="btn btn-full btn-lg" id="googleSignInBtn" onclick="signInWithGoogle()" style="margin-bottom:20px;background:#fff;color:#333;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span data-i18n="auth.login_google">Entrar com Google</span>
        </button>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
            <span style="font-size:0.8rem;color:var(--mp-text-light)" data-i18n="auth.login_email_divider">ou entre com e-mail</span>
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email" data-i18n="auth.email_label">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" data-i18n-placeholder="auth.email_placeholder" required>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="auth.password_label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Sua senha" data-i18n-placeholder="auth.password_placeholder" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" style="margin-top:8px" data-i18n="auth.login">
                Entrar
            </button>
        </form>

        <p style="margin-top:12px;text-align:right">
            <a href="#" onclick="forgotPassword()" style="font-size:0.8rem;color:var(--mp-primary)" data-i18n="auth.forgot_password">Esqueci minha senha</a>
        </p>

        <p style="margin-top:24px;font-size:0.75rem;color:var(--mp-text-light)">
            <a href="index.html" data-i18n="auth.back_to_site">Voltar ao site</a>
        </p>
    </div>

    <!-- Firebase SDK — movido para o body para eliminar render-blocking (ciclo #98) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
    <script src="js/core/constants.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/datastore.js"></script>
    <script src="js/core/firebase-config.js"></script>
    <script src="js/core/cloud-functions.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/audit.js"></script>
    <script>
        // Check if already logged in
        const session = Auth.getSession();
        if (session) {
            redirectByRole(session.role);
        }

        function redirectByRole(role) {
            if (role === MP.ROLES.SUPER_ADMIN) {
                window.location.href = 'admin/';
            } else {
                window.location.href = 'painel/';
            }
        }

        // Email/Password login (Firebase Auth com fallback legado)
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showError('Preencha todos os campos');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            hideError();

            try {
                // Tenta Firebase Auth primeiro
                const result = await Auth.login(email, password);
                if (result.success) {
                    redirectByRole(result.session.role);
                    return;
                }

                // Se Firebase Auth falhou, tenta login legado (migracao)
                const legacyResult = Auth.loginLegacy(email, password);
                if (legacyResult.success) {
                    showInfo('Sua conta foi migrada para autenticacao segura.');
                    setTimeout(() => redirectByRole(legacyResult.session.role), 1500);
                    return;
                }

                showError(result.error || 'E-mail ou senha incorretos');
            } catch (error) {
                console.error('Login error:', error);
                // Ultimo fallback: login legado offline
                const legacyResult = Auth.loginLegacy(email, password);
                if (legacyResult.success) {
                    redirectByRole(legacyResult.session.role);
                    return;
                }
                showError('Erro ao conectar. Verifique sua internet.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        // Google Sign-In
        async function signInWithGoogle() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285F4;border-radius:50%;animation:spin 1s linear infinite"></span> Entrando...';

            try {
                const result = await Auth.loginWithGoogle();
                if (result.success) {
                    redirectByRole(result.session.role);
                } else if (result.error) {
                    showError(result.error);
                    resetGoogleBtn();
                } else {
                    resetGoogleBtn(); // popup cancelado
                }
            } catch (error) {
                console.error('Google Sign-In error:', error);
                showError('Erro ao fazer login com Google');
                resetGoogleBtn();
            }
        }

        // Esqueci minha senha
        async function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError('Digite seu e-mail no campo acima para receber o link de recuperacao');
                return;
            }

            try {
                const result = await Auth.sendPasswordReset(email);
                if (result.success) {
                    showInfo('E-mail de recuperacao enviado! Verifique sua caixa de entrada.');
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('Erro ao enviar e-mail de recuperacao');
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            errorEl.style.background = '#fff3f3';
            errorEl.style.color = '#d32f2f';
        }

        function showInfo(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            errorEl.style.background = '#e8f5e9';
            errorEl.style.color = '#2e7d32';
        }

        function hideError() {
            document.getElementById('loginError').style.display = 'none';
        }

        function resetGoogleBtn() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = false;
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Entrar com Google';
        }
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
<div id="langSelector" style="position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:100"></div>
<script>i18n.renderLanguageSelector('langSelector'); i18n.translatePage();</script>
</body>
</html>
