<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyPot - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-panel.css">
    <link rel="stylesheet" href="css/mobile-app.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#42A5F5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MilkyPot">
    <link rel="apple-touch-icon" href="images/logo-milkypot.png">
    <link rel="icon" type="image/png" href="images/logo-milkypot.png">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
</head>
<body class="login-page">
    <div class="login-card">
        <img src="images/logo-milkypot.png" alt="MilkyPot" class="login-logo" style="border-radius:16px">
        <h1 class="login-title" data-i18n="auth.login_title">Acesso ao Sistema</h1>
        <p class="login-subtitle" data-i18n="auth.login_subtitle">Painel Administrativo & Franqueados</p>

        <div class="login-error" id="loginError"></div>

        <!-- Google Sign-In Button (Firebase) -->
        <button type="button" class="btn btn-full btn-lg" id="googleSignInBtn" onclick="signInWithGoogle()" style="margin-bottom:20px;background:#fff;color:#333;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span data-i18n="auth.login_google">Entrar com Google</span>
        </button>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
            <span style="font-size:0.8rem;color:var(--mp-text-light)" data-i18n="auth.login_email_divider">ou entre com e-mail</span>
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email" data-i18n="auth.email_label">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" data-i18n-placeholder="auth.email_placeholder" required>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="auth.password_label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Sua senha" data-i18n-placeholder="auth.password_placeholder" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" style="margin-top:8px" data-i18n="auth.login">
                Entrar
            </button>
        </form>

        <p style="margin-top:12px;text-align:right">
            <a href="#" onclick="forgotPassword()" style="font-size:0.8rem;color:var(--mp-primary)" data-i18n="auth.forgot_password">Esqueci minha senha</a>
        </p>

        <p style="margin-top:24px;font-size:0.75rem;color:var(--mp-text-light)">
            <a href="index.html" data-i18n="auth.back_to_site">Voltar ao site</a>
        </p>

        <!-- MilkyClube (cliente final) -->
        <div style="margin-top:20px;padding:16px;background:linear-gradient(135deg,#F3E5F5,#E3F2FD);border-radius:12px;text-align:center;">
            <div style="font-size:1.4rem;margin-bottom:4px;">🥛✨</div>
            <strong style="font-family:'Baloo 2',cursive;color:#5A4570;font-size:.95rem;display:block;margin-bottom:4px;">Sou cliente - MilkyClube</strong>
            <p style="font-size:.75rem;color:#6a5a80;margin:0 0 10px;line-height:1.4;">Clientes finais acessam o MilkyClube pelo app/site do clube, nao por este painel.</p>
            <a href="/clube/" style="display:inline-block;background:linear-gradient(135deg,#42A5F5,#EC407A);color:#fff;text-decoration:none;padding:8px 18px;border-radius:999px;font-size:.8rem;font-weight:700;">Conhecer o MilkyClube &rarr;</a>
        </div>
    </div>

    <script src="js/core/constants.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/datastore.js"></script>
    <script src="js/core/firebase-config.js"></script>
    <script src="js/core/cloud-functions.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/audit.js"></script>
    <script>
        // Auto-login com token de teste (gerado pelo generateTestToken).
        // Fluxo: signInAnonymously -> claimTestSession (Cloud Function) -> session.
        // Anonimo da identidade Firebase Auth real (sem IAM signBlob).
        // Custom claims aplicados via Admin SDK fazem request.auth.token ter
        // role/franchiseId/isTestSession — Cloud Functions aceitam normalmente.
        (function() {
            var p = new URLSearchParams(window.location.search);
            var tok = p.get('testToken');
            var fid = p.get('fid');
            if (tok && typeof firebase !== 'undefined') {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Nunito,sans-serif;flex-direction:column;gap:12px"><span style="font-size:2rem">🧪</span><strong style="font-size:1.1rem">Abrindo sessao de teste...</strong><small style="color:#6b7280" id="ts_step">Autenticando...</small></div>';

                var stepEl = function(t){ var el = document.getElementById('ts_step'); if(el) el.textContent = t; };

                // 1) Login anonimo (Firebase Auth real)
                firebase.auth().signInAnonymously()
                    .then(function(cred){
                        stepEl('Validando token...');
                        // 2) Claim test session via Cloud Function
                        var fn = firebase.app().functions('southamerica-east1').httpsCallable('claimTestSession');
                        return fn({ testToken: tok }).then(function(r){ return { cred: cred, result: r.data || {} }; });
                    })
                    .then(function(ctx){
                        if (!ctx.result.success) throw new Error(ctx.result.error || 'claim falhou');
                        stepEl('Carregando perfil...');
                        // 3) Force token refresh pra pegar custom claims novos
                        return ctx.cred.user.getIdToken(true).then(function(){ return ctx; });
                    })
                    .then(function(ctx){
                        var data = ctx.result;
                        // 4) Salva session local
                        var session = {
                            userId:        data.testUid,
                            email:         data.email || (data.testUid + '@test.milkypot.internal'),
                            name:          data.name || 'Agente de Teste',
                            role:          (data.claims && data.claims.role) || 'franchisee',
                            franchiseId:   (data.claims && data.claims.franchiseId) || fid,
                            firebaseUid:   ctx.cred.user.uid,
                            anonUid:       ctx.cred.user.uid,
                            isTestSession: true,
                            token:         tok,
                            loginAt:       new Date().toISOString(),
                            expiresAt:     new Date(data.expiresAt || (Date.now() + 3600000)).toISOString()
                        };
                        localStorage.setItem('mp_session', JSON.stringify(session));
                        window.location.href = '/painel/test-checklist.html';
                    })
                    .catch(function(err) {
                        console.error('[TestSession]', err);
                        var msg = (err && err.message && err.message.includes('expired')) ? 'Token expirado'
                               : (err && err.message && err.message.includes('not found')) ? 'Token invalido'
                               : (err && err.message) ? err.message
                               : 'Erro ao abrir sessao de teste';
                        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Nunito,sans-serif;flex-direction:column;gap:16px;color:#dc2626"><span style="font-size:2.5rem">❌</span><strong>' + msg + '</strong><small style="color:#6b7280">Peca um novo link ao administrador</small><a href="/login.html" style="color:#7C3AED;font-weight:700">Voltar ao login</a></div>';
                    });
                return;
            }
        })();

        // ── Detecção offline ──────────────────────────────────────
        var _isOffline = !navigator.onLine;
        function updateOfflineBanner() {
            _isOffline = !navigator.onLine;
            var banner = document.getElementById('offlineBanner');
            if (!banner) return;
            banner.style.display = _isOffline ? 'block' : 'none';
        }
        window.addEventListener('online',  updateOfflineBanner);
        window.addEventListener('offline', updateOfflineBanner);

        // ── Injeta banner offline no topo do card ─────────────────
        (function() {
            var card = document.querySelector('.login-card');
            if (!card) return;
            var b = document.createElement('div');
            b.id = 'offlineBanner';
            b.style.cssText = 'display:none;background:#FFF3CD;color:#856404;border:1px solid #FFEEBA;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:14px;text-align:center;line-height:1.4';
            b.innerHTML = '📡 <strong>Sem conexão</strong> — pressione <strong>Entrar</strong> para abrir com a sessão salva neste dispositivo.';
            card.insertBefore(b, card.firstChild);
            updateOfflineBanner();
        })();

        // ── Check se já está logado (síncrono) ───────────────────
        // IMPORTANTE: nao redireciona se chegou aqui por role_mismatch (evita loop)
        var qsParams = new URLSearchParams(window.location.search);
        var redirectReason = qsParams.get('reason');
        const session = Auth.getSession();
        if (session && redirectReason !== 'role_mismatch') {
            redirectByRole(session.role);
        } else if (redirectReason === 'role_mismatch') {
            // Limpa qualquer estado residual e mostra mensagem
            try { localStorage.removeItem('mp_session'); } catch(e) {}
            try { localStorage.removeItem('mp_admin_session_backup'); } catch(e) {}
            try { localStorage.removeItem('mp_quick_login'); } catch(e) {}
            try { if (typeof firebaseAuth !== 'undefined' && firebaseAuth) firebaseAuth.signOut().catch(function(){}); } catch(e) {}
            setTimeout(function() {
                showError('Sessao invalida ou perfil sem acesso a este painel. Faça login novamente.');
            }, 50);
        }

        // ── onAuthStateChanged: Firebase restaura sessão do IndexedDB ───
        // currentUser é null no carregamento síncrono mas fica pronto em ~1s.
        // Se o usuário estava logado antes da queda de internet, este listener
        // detecta e redireciona sem precisar digitar nada.
        if (typeof firebaseAuth !== 'undefined' && firebaseAuth && redirectReason !== 'role_mismatch') {
            var _authListenerFired = false;
            var _authUnsubscribe = firebaseAuth.onAuthStateChanged(function(user) {
                if (_authListenerFired) return;
                _authListenerFired = true;
                if (typeof _authUnsubscribe === 'function') _authUnsubscribe();

                if (user) {
                    // Firebase tem sessão ativa → verifica/cria mp_session local
                    var existing = Auth.getSession();
                    if (existing) {
                        redirectByRole(existing.role);
                        return;
                    }
                    // Sem mp_session local mas Firebase logado: busca perfil e reconstrói
                    var profile = (typeof Auth._findUserProfile === 'function') ? Auth._findUserProfile(user.email) : null;
                    if (profile) {
                        var rebuilt = Auth._buildSession(user, profile);
                        Auth._saveSession(rebuilt);
                        redirectByRole(rebuilt.role);
                    }
                }
                // user === null → Firebase também não tem sessão; mostra form normalmente
            });
        }

        function redirectByRole(role) {
            if (role === MP.ROLES.SUPER_ADMIN) {
                window.location.href = 'admin/';
            } else if (role === MP.ROLES.FRANCHISEE) {
                window.location.href = 'painel/';
            } else {
                // Role desconhecido (manager, staff, undefined) — limpa sessao e mostra erro
                try { localStorage.removeItem('mp_session'); } catch(e) {}
                try { if (typeof firebaseAuth !== 'undefined' && firebaseAuth) firebaseAuth.signOut().catch(function(){}); } catch(e) {}
                showError('Seu perfil (' + (role || 'sem role') + ') nao tem acesso a este painel. Contate o administrador.');
            }
        }

        // ── Login com Email/Senha ─────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showError('Preencha todos os campos');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            hideError();

            try {
                // ── OFFLINE: usa sessão anterior salva ────────────
                if (!navigator.onLine) {
                    const offResult = Auth.loginOffline(email);
                    if (offResult.success) {
                        showInfo('📡 Sem conexão — abrindo com sessão salva neste dispositivo.');
                        setTimeout(() => redirectByRole(offResult.session.role), 900);
                        return;
                    }
                    showError('Sem conexão e nenhuma sessão anterior encontrada. Conecte à internet para o primeiro acesso.');
                    return;
                }

                // ── ONLINE: Firebase Auth normal ──────────────────
                const result = await Auth.login(email, password);
                if (result.success) {
                    redirectByRole(result.session.role);
                    return;
                }

                // Firebase retornou erro (credenciais erradas, etc.)
                showError(result.error || 'E-mail ou senha incorretos');
            } catch (error) {
                console.error('Login error:', error);
                // Erro de rede durante tentativa online → tenta sessao offline
                const offResult = Auth.loginOffline(email);
                if (offResult.success) {
                    showInfo('📡 Conexão instável — abrindo com sessão salva.');
                    setTimeout(() => redirectByRole(offResult.session.role), 900);
                    return;
                }
                showError('Erro de conexão. Verifique sua internet e tente novamente.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        // Google Sign-In
        async function signInWithGoogle() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285F4;border-radius:50%;animation:spin 1s linear infinite"></span> Entrando...';

            try {
                const result = await Auth.loginWithGoogle();
                if (result.success) {
                    redirectByRole(result.session.role);
                } else if (result.error) {
                    showError(result.error);
                    resetGoogleBtn();
                } else {
                    resetGoogleBtn(); // popup cancelado
                }
            } catch (error) {
                console.error('Google Sign-In error:', error);
                showError('Erro ao fazer login com Google');
                resetGoogleBtn();
            }
        }

        // Esqueci minha senha
        async function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError('Digite seu e-mail no campo acima para receber o link de recuperacao');
                return;
            }

            try {
                const result = await Auth.sendPasswordReset(email);
                if (result.success) {
                    showInfo('E-mail de recuperacao enviado! Verifique sua caixa de entrada.');
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('Erro ao enviar e-mail de recuperacao');
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            errorEl.style.background = '#fff3f3';
            errorEl.style.color = '#d32f2f';
        }

        function showInfo(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            errorEl.style.background = '#e8f5e9';
            errorEl.style.color = '#2e7d32';
        }

        function hideError() {
            document.getElementById('loginError').style.display = 'none';
        }

        function resetGoogleBtn() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = false;
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Entrar com Google';
        }
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
<div id="langSelector" style="position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:100"></div>
<script>i18n.renderLanguageSelector('langSelector'); i18n.translatePage();</script>
</body>
</html>
