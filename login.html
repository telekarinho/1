<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyPot - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-panel.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body class="login-page">
    <div class="login-card">
        <img src="images/logo-milkypot.png" alt="MilkyPot" class="login-logo" style="border-radius:16px">
        <h1 class="login-title">Acesso ao Sistema</h1>
        <p class="login-subtitle">Painel Administrativo & Franqueados</p>

        <div class="login-error" id="loginError"></div>

        <!-- Google Sign-In Button (Firebase) -->
        <button type="button" class="btn btn-full btn-lg" id="googleSignInBtn" onclick="signInWithGoogle()" style="margin-bottom:20px;background:#fff;color:#333;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Entrar com Google
        </button>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
            <span style="font-size:0.8rem;color:var(--mp-text-light)">ou entre com e-mail</span>
            <div style="flex:1;height:1px;background:var(--mp-border)"></div>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
                Entrar
            </button>
        </form>

        <div class="login-demo">
            <h4>Contas Demo para Teste</h4>
            <div class="demo-accounts">
                <button class="demo-account" onclick="fillDemo('admin@milkypot.com','admin123')">
                    <strong>👑 Admin Geral</strong><br>
                    <span>admin@milkypot.com / admin123</span>
                </button>
                <button class="demo-account" onclick="fillDemo('catuai@milkypot.com','catuai123')">
                    <strong>🏪 Franqueado Catuai</strong><br>
                    <span>catuai@milkypot.com / catuai123</span>
                </button>
                <button class="demo-account" onclick="fillDemo('morumbi@milkypot.com','morumbi123')">
                    <strong>🏪 Franqueado Morumbi</strong><br>
                    <span>morumbi@milkypot.com / morumbi123</span>
                </button>
            </div>
        </div>

        <p style="margin-top:24px;font-size:0.75rem;color:var(--mp-text-light)">
            <a href="index.html">Voltar ao site</a>
        </p>
    </div>

    <script src="js/core/utils.js"></script>
    <script src="js/core/datastore.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/firebase-config.js"></script>
    <script>
        // Check if already logged in
        const session = Auth.getSession();
        if (session) {
            if (session.role === 'super_admin') {
                window.location.href = 'admin/';
            } else {
                window.location.href = 'painel/';
            }
        }

        // Email/Password login (localStorage demo)
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const result = Auth.login(email, password);
            if (result.success) {
                if (result.session.role === 'super_admin') {
                    window.location.href = 'admin/';
                } else {
                    window.location.href = 'painel/';
                }
            } else {
                showError(result.error);
            }
        }

        // Google Sign-In with Firebase
        function signInWithGoogle() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = true;
            btn.innerHTML = '<span style="display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285F4;border-radius:50%;animation:spin 1s linear infinite"></span> Entrando...';

            firebaseAuth.signInWithPopup(googleProvider)
                .then((result) => {
                    const user = result.user;
                    const email = user.email;
                    const name = user.displayName;
                    const avatar = user.photoURL;

                    // Check if user exists in local system
                    const users = DataStore.get('users') || [];
                    let localUser = users.find(u => u.email === email);

                    if (localUser) {
                        // Login existing user
                        const session = {
                            userId: localUser.id,
                            email: localUser.email,
                            name: localUser.name,
                            role: localUser.role,
                            franchiseId: localUser.franchiseId,
                            token: Utils.generateId() + Utils.generateId(),
                            loginAt: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
                            googleAuth: true,
                            avatar: avatar,
                            firebaseUid: user.uid
                        };
                        localStorage.setItem(Auth.SESSION_KEY, JSON.stringify(session));

                        if (localUser.role === 'super_admin') {
                            window.location.href = 'admin/';
                        } else {
                            window.location.href = 'painel/';
                        }
                    } else if (email === 'jocimarrodrigo@gmail.com') {
                        // Auto-register owner as super_admin
                        const newUser = Auth.createUser({
                            email: email,
                            name: name || 'Rodrigo',
                            password: 'google_auth',
                            role: 'super_admin'
                        });

                        const session = {
                            userId: newUser.user ? newUser.user.id : Utils.generateId(),
                            email: email,
                            name: name || 'Rodrigo',
                            role: 'super_admin',
                            token: Utils.generateId() + Utils.generateId(),
                            loginAt: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
                            googleAuth: true,
                            avatar: avatar,
                            firebaseUid: user.uid
                        };
                        localStorage.setItem(Auth.SESSION_KEY, JSON.stringify(session));
                        window.location.href = 'admin/';
                    } else {
                        // User not registered
                        showError('Este e-mail Google nao esta cadastrado no sistema. Solicite acesso ao administrador.');
                        resetGoogleBtn();
                    }
                })
                .catch((error) => {
                    console.error('Google Sign-In error:', error);
                    if (error.code !== 'auth/popup-closed-by-user') {
                        showError('Erro ao fazer login com Google: ' + error.message);
                    }
                    resetGoogleBtn();
                });
        }

        function showError(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        function resetGoogleBtn() {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = false;
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Entrar com Google';
        }

        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
