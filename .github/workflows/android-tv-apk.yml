name: Build MilkyPot TV APK

on:
  push:
    branches: [main]
    paths:
      - 'android-tv/**'
      - '.github/workflows/android-tv-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # pra publicar release

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: android-tv
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: android-tv
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: milkypot-tv-apk
          path: android-tv/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Publish rolling release (MilkyPot TV APK)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tv-apk-latest
          name: "MilkyPot TV — APK mais recente"
          body: |
            APK do MilkyPot TV gerado automaticamente do commit ${{ github.sha }}.

            **Como instalar:**
            1. Baixe o arquivo `app-release.apk` abaixo direto na TV (ou transfira via pendrive/USB)
            2. Abra o APK na TV. Se pedir, autorize "Fontes desconhecidas"
            3. Abra o app "MilkyPot TV" no menu da TV
            4. Selecione TV 1 / TV 2 / TV 3 (só na primeira vez)
            5. Pronto — vídeos começam a tocar em loop com decoder nativo

            Pra trocar a TV escolhida, segure o botão VOLTAR no controle por 2s.
          files: android-tv/app/build/outputs/apk/release/*.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
