name: Build MilkyPot TV APK

on:
  push:
    branches: [main]
    paths:
      - 'android-tv/**'
      - '.github/workflows/android-tv-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # pra publicar release
      pull-requests: write # pra abrir PR com update do tv.apk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: android-tv
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: android-tv
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Rename APK to tv.apk (nome fixo para download publico)
        run: |
          SRC=$(ls android-tv/app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$SRC" android-tv/app/build/outputs/apk/release/tv.apk
          ls -la android-tv/app/build/outputs/apk/release/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: milkypot-tv-apk
          path: android-tv/app/build/outputs/apk/release/tv.apk
          retention-days: 30

      - name: Publish rolling release (MilkyPot TV APK)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tv-apk-latest
          name: "MilkyPot TV — APK mais recente"
          body: |
            APK do MilkyPot TV gerado automaticamente do commit ${{ github.sha }}.

            **Link rápido pra instalar direto na TV:**
            https://milkypot.com/tv.apk

            **Passos:**
            1. Na TV, abra o browser e digite `milkypot.com/tv.apk`
            2. Se pedir, autorize "Fontes desconhecidas"
            3. Instale e abra o app "MilkyPot TV" no menu
            4. Selecione TV 1 / TV 2 / TV 3 (só na primeira vez)

            Pra trocar a TV escolhida, segure VOLTAR por 2s.
          files: android-tv/app/build/outputs/apk/release/tv.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Pages serve arquivos direto do repo. Copiamos o APK para
      # a raiz e abrimos um PR com a atualização — a branch main é
      # protegida e exige PR + check manifest, então push direto falha.
      # O PR fica aberto aguardando merge manual (ou auto-merge se habilitado).
      - name: Open PR updating tv.apk in repo root
        if: github.ref == 'refs/heads/main'
        run: |
          cp android-tv/app/build/outputs/apk/release/tv.apk tv.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tv.apk
          if git diff --cached --quiet; then
            echo "tv.apk sem mudanças — pulando PR."
            exit 0
          fi

          BRANCH="chore/update-tv-apk-${GITHUB_SHA:0:7}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update tv.apk from build ${GITHUB_SHA:0:7}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(tv-apk): update to build ${GITHUB_SHA:0:7}" \
            --body "APK atualizado automaticamente pelo build. Release: https://github.com/telekarinho/1/releases/tag/tv-apk-latest" \
            --base main \
            --head "$BRANCH" || echo "gh pr create falhou (PR ja pode existir)"

          # Tenta habilitar auto-merge assim que os checks passarem.
          gh pr merge "$BRANCH" --squash --auto --delete-branch || echo "auto-merge indisponivel; PR aguardando merge manual"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
