name: Deploy MilkyPot

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # 1. Validate HTML and JS
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for syntax errors in JS core
        run: |
          echo "Validating JavaScript files..."
          errors=0
          for f in js/core/*.js; do
            if ! node --check "$f" 2>/dev/null; then
              echo "Syntax error: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors files with syntax errors"
            exit 1
          fi
          echo "All JS files valid"

      - name: Check for required files
        run: |
          echo "Checking required files..."
          required_files=(
            "index.html"
            "login.html"
            "cardapio.html"
            "js/core/auth.js"
            "js/core/constants.js"
            "js/core/datastore.js"
            "js/core/firebase-config.js"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
          done
          echo "All required files present"

  # ============================================
  # 2. Deploy to GitHub Pages
  # ============================================
  deploy-pages:
    needs: [validate]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
