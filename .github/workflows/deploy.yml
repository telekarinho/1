name: Deploy MilkyPot

on:
  push:
    branches: ["main"]
  # Permite disparar manualmente pela aba Actions (qualquer branch)
  workflow_dispatch:
    inputs:
      deploy_firebase:
        description: "Deploy Firebase (hosting + rules)"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # 1. Validate HTML and JS
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for syntax errors in JS core
        run: |
          echo "Validating JavaScript files..."
          errors=0
          for f in js/core/*.js; do
            if ! node --check "$f" 2>/dev/null; then
              echo "Syntax error: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors files with syntax errors"
            exit 1
          fi
          echo "All JS files valid"

      - name: Check for required files
        run: |
          echo "Checking required files..."
          required_files=(
            "index.html"
            "login.html"
            "cardapio.html"
            "js/core/auth.js"
            "js/core/constants.js"
            "js/core/datastore.js"
            "js/core/firebase-config.js"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
          done
          echo "All required files present"

  # ============================================
  # 2. Deploy to GitHub Pages
  # ============================================
  deploy-pages:
    needs: [validate]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # 3. Deploy to Firebase (hosting + storage + firestore rules)
  # ============================================
  # Requer secret FIREBASE_SERVICE_ACCOUNT_MILKYPOT_AD945 contendo o JSON
  # da service account com role "Firebase Hosting Admin" + "Cloud Datastore
  # Owner" + "Storage Admin" no projeto milkypot-ad945.
  # Como gerar:
  #   gcloud iam service-accounts create gh-deploy --project=milkypot-ad945
  #   gcloud projects add-iam-policy-binding milkypot-ad945 \
  #     --member="serviceAccount:gh-deploy@milkypot-ad945.iam.gserviceaccount.com" \
  #     --role="roles/firebasehosting.admin"
  #   gcloud iam service-accounts keys create key.json \
  #     --iam-account=gh-deploy@milkypot-ad945.iam.gserviceaccount.com
  #   # cole o conteudo de key.json em Settings → Secrets → Actions
  deploy-firebase:
    needs: [validate]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_firebase) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MILKYPOT_AD945 }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "❌ Secret FIREBASE_SERVICE_ACCOUNT_MILKYPOT_AD945 não configurada."
            echo "    Crie em Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy hosting + storage rules + firestore rules
        run: |
          firebase deploy \
            --only hosting,storage,firestore:rules \
            --project milkypot-ad945 \
            --non-interactive \
            --force
