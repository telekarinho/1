name: check-manifest

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run manifest check
        run: bash scripts/check-manifest.sh
