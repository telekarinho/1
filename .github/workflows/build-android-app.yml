name: Build Android APK (TWA Colaborador)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Versão (ex: 1.0.0)'
        required: true
        default: '1.0.0'
      versionCode:
        description: 'Build number'
        required: true
        default: '1'

permissions:
  contents: write   # necessário pra criar release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.22.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Pre-configure Bubblewrap (skip interactive prompts)
        run: |
          mkdir -p $HOME/.bubblewrap
          cat > $HOME/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo "=== Bubblewrap config ==="
          cat $HOME/.bubblewrap/config.json

      - name: Generate or restore keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
            echo "Keystore restaurado de secret"
          else
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass milkypot2026 \
              -keypass milkypot2026 \
              -dname "CN=MilkyPot, OU=TI, O=MilkyPot Franquias, L=Londrina, S=PR, C=BR"
            echo "Keystore novo gerado"
          fi

      - name: Show SHA256 fingerprint (pra assetlinks)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'milkypot2026' }}
        run: |
          echo "=== SHA256 fingerprint da keystore (use em assetlinks.json) ==="
          keytool -list -v -keystore android.keystore -alias android -storepass "$KS_PASS" | grep "SHA256:" || true

      - name: Prepare twa-manifest.json
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'milkypot2026' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'milkypot2026' }}
        run: |
          mkdir -p android-build
          cp android.keystore android-build/android.keystore
          # twa-manifest.json com config inline (sem precisar de bubblewrap init interativo)
          cat > android-build/twa-manifest.json <<EOF
          {
            "packageId": "com.milkypot.colaborador",
            "host": "milkypot.com",
            "name": "MilkyPot Colaborador",
            "launcherName": "MilkyPot Colab",
            "display": "standalone",
            "themeColor": "#16A34A",
            "navigationColor": "#16A34A",
            "navigationColorDark": "#16A34A",
            "navigationDividerColor": "#16A34A",
            "navigationDividerColorDark": "#16A34A",
            "backgroundColor": "#16A34A",
            "enableNotifications": true,
            "startUrl": "/colaborador/",
            "iconUrl": "https://milkypot.com/images/logo-milkypot.png",
            "maskableIconUrl": "https://milkypot.com/images/logo-milkypot.png",
            "monochromeIconUrl": "https://milkypot.com/images/logo-milkypot.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "appVersion": "${{ github.event.inputs.versionName }}",
            "appVersionCode": ${{ github.event.inputs.versionCode }},
            "shortcuts": [
              {
                "name": "Bater Ponto",
                "shortName": "Ponto",
                "url": "/colaborador/?action=punch",
                "iconUrl": "https://milkypot.com/images/logo-milkypot.png"
              }
            ],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://milkypot.com/colaborador/manifest.json",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": { "enabled": true },
              "playBilling": { "enabled": false }
            },
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://milkypot.com/colaborador/",
            "minSdkVersion": 21,
            "orientation": "portrait",
            "additionalTrustedOrigins": [],
            "retainedBundles": []
          }
          EOF
          cat android-build/twa-manifest.json

      - name: Initialize TWA project (non-interactive via Bubblewrap config)
        working-directory: android-build
        run: |
          # Com $HOME/.bubblewrap/config.json pre-criado, init nao pergunta nada
          # Run como subshell pra heredoc nao colidir com bubblewrap
          bubblewrap init --manifest=https://milkypot.com/colaborador/manifest.json --directory=. --skipPwaValidation < /dev/null
          echo "=== Files apos init ==="
          ls -la

      - name: Build APK + AAB com Gradle (non-interactive)
        working-directory: android-build
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'milkypot2026' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'milkypot2026' }}
        run: |
          # Bubblewrap build e interativo. Roda gradle direto.
          # Cria gradle.properties com senhas pra signing nao perguntar
          if [ -f gradle.properties ]; then
            echo "" >> gradle.properties
          fi
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.injected.signing.store.file=$(pwd)/android.keystore" >> gradle.properties
          echo "android.injected.signing.store.password=$KS_PASS" >> gradle.properties
          echo "android.injected.signing.key.alias=android" >> gradle.properties
          echo "android.injected.signing.key.password=$KEY_PASS" >> gradle.properties
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon || true
          echo "=== Listing artifacts ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Locate built artifacts
        id: artifacts
        working-directory: android-build
        run: |
          APK=$(find . -name "*.apk" -path "*release*" | head -1)
          AAB=$(find . -name "*.aab" -path "*release*" | head -1)
          echo "APK: $APK"
          echo "AAB: $AAB"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        if: steps.artifacts.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: MilkyPot-Colaborador-Android-${{ github.event.inputs.versionName }}-apk
          path: android-build/${{ steps.artifacts.outputs.apk_path }}
          if-no-files-found: warn

      - name: Upload AAB artifact (Play Store)
        if: steps.artifacts.outputs.aab_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: MilkyPot-Colaborador-Android-${{ github.event.inputs.versionName }}-aab
          path: android-build/${{ steps.artifacts.outputs.aab_path }}
          if-no-files-found: warn

      - name: Rename for release
        if: steps.artifacts.outputs.apk_path != ''
        working-directory: android-build
        run: |
          cp "${{ steps.artifacts.outputs.apk_path }}" "MilkyPot-Colaborador-${{ github.event.inputs.versionName }}.apk" || true
          [ -n "${{ steps.artifacts.outputs.aab_path }}" ] && cp "${{ steps.artifacts.outputs.aab_path }}" "MilkyPot-Colaborador-${{ github.event.inputs.versionName }}.aab" || true
          ls -la *.apk *.aab 2>/dev/null

      - name: Create GitHub Release
        if: steps.artifacts.outputs.apk_path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.event.inputs.versionName }}-${{ github.event.inputs.versionCode }}
          name: 'MilkyPot Colaborador Android v${{ github.event.inputs.versionName }}'
          body: |
            APK Android instalável do Portal do Colaborador (TWA - Trusted Web Activity).

            **Como instalar (qualquer Android):**
            1. Baixe o APK abaixo
            2. No celular: Configurações > Segurança > "Permitir apps de fontes desconhecidas"
            3. Toque no APK baixado e instale

            **Para publicar na Play Store:** use o arquivo .AAB (App Bundle).

            **Funcionalidades:**
            - Login com CPF + PIN via Cloud Function
            - Bater ponto com geolocalização e selfie
            - Push notifications via FCM
            - Espelho mensal, holerite, banco de horas, benefícios
            - Funciona offline
          files: |
            android-build/MilkyPot-Colaborador-*.apk
            android-build/MilkyPot-Colaborador-*.aab
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
