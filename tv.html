<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MilkyPot TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
#vid{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000;display:none}
#pic{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000;display:none}
#msg{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;text-align:center;padding:20px;background:#1a1a2e}
</style>
</head>
<body>
<div id="msg">Carregando...</div>
<img id="pic">
<video id="vid" muted autoplay playsinline webkit-playsinline preload="none"></video>

<script>
/*
  MilkyPot TV — Ultra Light
  1 video element reusado, 0 DOM create/destroy, 0 Promises
  Compativel com Android TV 4.4+, WebView antigo, pouca RAM
  URL: /tv.html?f=FRANCHISE_ID
*/
var FIRE = 'https://firestore.googleapis.com/v1/projects/milkypot-ad945/databases/(default)/documents/datastore/';

var vid = document.getElementById('vid');
var pic = document.getElementById('pic');
var msg = document.getElementById('msg');

var playlist = [];
var idx = -1;
var tmr = null;

// Parse URL
var qs = location.search || '';
var fid = null;
var m = qs.match(/[?&]f=([^&#]*)/);
if(m) fid = decodeURIComponent(m[1]);
if(!fid){
  var h = location.hash.replace('#','');
  if(h) fid = decodeURIComponent(h.split('/')[0]);
}

// XMLHttpRequest (funciona em WebView antigo, sem Promise/fetch)
function getDoc(docId, cb){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', FIRE + encodeURIComponent(docId), true);
  xhr.onreadystatechange = function(){
    if(xhr.readyState !== 4) return;
    if(xhr.status !== 200){ cb(null); return; }
    try {
      var d = JSON.parse(xhr.responseText);
      if(d && d.fields && d.fields.value && d.fields.value.stringValue){
        cb(JSON.parse(d.fields.value.stringValue));
      } else { cb(null); }
    } catch(e){ cb(null); }
  };
  xhr.onerror = function(){ cb(null); };
  try { xhr.send(); } catch(e){ cb(null); }
}

// Carrega playlist
function loadPlaylist(){
  if(!fid){ msg.textContent = 'Parametro f= ausente na URL'; return; }

  var loaded = 0;
  var mediaData = null;
  var playlistData = null;

  function check(){
    loaded++;
    if(loaded < 2) return;

    var mediaMap = {};
    var i;
    if(mediaData){
      for(i = 0; i < mediaData.length; i++){
        if(mediaData[i] && mediaData[i].id) mediaMap[mediaData[i].id] = mediaData[i];
      }
    }

    var order = playlistData;
    if((!order || !order.length) && mediaData && mediaData.length){
      order = [];
      for(i = 0; i < mediaData.length; i++){
        order.push({ mediaId: mediaData[i].id, duration: mediaData[i].duration || 10 });
      }
    }

    playlist = [];
    if(order){
      for(i = 0; i < order.length; i++){
        var p = order[i];
        var mid = (typeof p === 'string') ? p : p.mediaId;
        var dur = (typeof p === 'string') ? 10 : (p.duration || 10);
        if(mediaMap[mid]){
          playlist.push({ m: mediaMap[mid], dur: dur * 1000 });
        }
      }
    }

    if(!playlist.length){
      msg.textContent = 'Playlist vazia.';
      setTimeout(loadPlaylist, 30000);
      return;
    }

    msg.style.display = 'none';
    idx = -1;
    next();
  }

  getDoc('tv_media_' + fid, function(d){ mediaData = d || []; check(); });
  getDoc('tv_playlist_' + fid, function(d){ playlistData = d || []; check(); });
}

// Mostra imagem
function showImage(src, durMs){
  vid.style.display = 'none';
  vid.removeAttribute('src');
  pic.style.display = 'block';
  pic.src = src;
  tmr = setTimeout(next, durMs);
}

// Mostra video
function showVideo(src, durMs, single){
  pic.style.display = 'none';
  vid.style.display = 'block';
  vid.loop = single;
  vid.src = src;

  // Timeout: se video nao carregar em 6s, pula
  var stuck = setTimeout(function(){
    vid.removeAttribute('src');
    next();
  }, 6000);

  vid.oncanplay = function(){
    vid.oncanplay = null;
    clearTimeout(stuck);

    // Pra video com loop (unico na playlist), deixa rodar
    if(single) return;

    // Agenda proximo slide
    var d = durMs;
    if(vid.duration && isFinite(vid.duration)){
      d = vid.duration * 1000 + 200;
    }
    tmr = setTimeout(next, d);
  };

  vid.onended = function(){
    if(!single) next();
  };

  vid.onerror = function(){
    clearTimeout(stuck);
    next();
  };

  try { vid.play(); } catch(e){}
}

// Mostra texto
function showText(item, durMs){
  vid.style.display = 'none';
  vid.removeAttribute('src');
  pic.style.display = 'none';
  msg.style.display = 'flex';
  msg.style.background = item.bgColor || '#1a1a2e';
  var t = item.title || '';
  var s = item.subtitle || '';
  msg.innerHTML = '<div><h1 style="font-size:clamp(28px,6vw,72px);font-weight:800">' + esc(t) + '</h1>' +
    (s ? '<p style="font-size:clamp(16px,3vw,36px);margin-top:8px;opacity:.9">' + esc(s) + '</p>' : '') + '</div>';
  tmr = setTimeout(next, durMs);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Proximo slide
function next(){
  clearTimeout(tmr);
  if(!playlist.length) return;

  idx = (idx + 1) % playlist.length;
  var item = playlist[idx];
  var m = item.m;
  var dur = item.dur;
  var single = (playlist.length === 1);
  var src = m.url || m.dataUrl || '';

  if(!m.type || !src){
    tmr = setTimeout(next, 2000);
    return;
  }

  if(m.type === 'image'){
    showImage(src, dur);
  } else if(m.type === 'video'){
    showVideo(src, dur, single);
  } else if(m.type === 'text'){
    showText(m, dur);
  } else {
    tmr = setTimeout(next, 2000);
  }
}

// Refresh playlist a cada 60s (sem recarregar pagina)
setInterval(function(){
  if(!fid) return;
  getDoc('tv_media_' + fid, function(md){
    getDoc('tv_playlist_' + fid, function(pd){
      if(!md && !pd) return;
      var mediaMap = {};
      var i;
      if(md) for(i=0;i<md.length;i++) if(md[i]&&md[i].id) mediaMap[md[i].id]=md[i];
      var order = pd;
      if((!order||!order.length)&&md&&md.length){
        order=[];for(i=0;i<md.length;i++) order.push({mediaId:md[i].id,duration:md[i].duration||10});
      }
      var newPl=[];
      if(order) for(i=0;i<order.length;i++){
        var p=order[i];var mid=(typeof p==='string')?p:p.mediaId;var dur=(typeof p==='string')?10:(p.duration||10);
        if(mediaMap[mid]) newPl.push({m:mediaMap[mid],dur:dur*1000});
      }
      if(newPl.length) playlist=newPl;
    });
  });
}, 60000);

// Reload pagina a cada 30min pra liberar memoria
setTimeout(function(){ location.reload(); }, 30*60*1000);

// Inicia
if(fid){
  loadPlaylist();
} else {
  msg.textContent = 'Use: /tv.html?f=ID_DA_FRANQUIA';
}
</script>
</body>
</html>
