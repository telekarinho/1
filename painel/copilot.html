<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copiloto MilkyPot · Configuração</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="../images/logo-milkypot.png">
<style>
:root {
  --bg: #faf7ff;
  --card: #ffffff;
  --primary: #7C3AED;
  --primary-2: #EC407A;
  --text: #1f1233;
  --muted: #6B5A87;
  --border: #E9DDF5;
  --tool-bg: #FFF7ED;
  --tool-border: #FED7AA;
  --tool-text: #9A3412;
  --ok: #16a34a;
  --err: #dc2626;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: linear-gradient(135deg, #faf7ff 0%, #ffeef7 100%);
  color: var(--text);
  display: flex;
  flex-direction: column;
}
header {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(124,58,237,.15);
}
header .logo {
  font-size: 1.7rem;
}
header h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 700;
  flex: 1;
}
header .status {
  font-size: .75rem;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.2);
  display: flex;
  align-items: center;
  gap: 6px;
}
header .status .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #fbbf24;
  animation: pulse 1.5s infinite;
}
header .status.ok .dot { background: #4ade80; animation: none; }
header .status.err .dot { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.welcome {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.welcome h2 {
  margin: 0 0 8px;
  font-size: 1.3rem;
  color: var(--primary);
}
.welcome p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; font-size: .95rem; }
.examples {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.example {
  background: #f5efff;
  border: 1px solid #e0d0ff;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: .82rem;
  cursor: pointer;
  text-align: left;
  color: var(--text);
  transition: all .15s;
  font-family: inherit;
}
.example:hover {
  background: #ebe0ff;
  border-color: var(--primary);
  transform: translateY(-1px);
}

.msg {
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
}
.msg.user { flex-direction: row-reverse; }
.msg .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: white;
}
.msg.user .avatar { background: linear-gradient(135deg, #42A5F5, #66BB6A); }
.msg .bubble {
  max-width: 75%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px 16px;
  line-height: 1.55;
  font-size: .94rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .bubble {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: white;
  border: none;
}

.tool-trace {
  background: var(--tool-bg);
  border: 1px solid var(--tool-border);
  border-radius: 12px;
  padding: 10px 14px;
  margin: 8px 0;
  font-size: .82rem;
  font-family: 'JetBrains Mono', Menlo, monospace;
  color: var(--tool-text);
}
.tool-trace .tool-head {
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.tool-trace.ok .tool-head::before { content: '✓'; color: var(--ok); }
.tool-trace.err .tool-head::before { content: '✗'; color: var(--err); }
.tool-trace details { margin-top: 6px; }
.tool-trace summary { cursor: pointer; color: var(--muted); font-weight: 500; }
.tool-trace pre {
  margin: 6px 0 0;
  background: rgba(0,0,0,.04);
  padding: 8px;
  border-radius: 6px;
  font-size: .75rem;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.thinking {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}
.thinking span {
  width: 8px; height: 8px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.thinking span:nth-child(2) { animation-delay: .2s; }
.thinking span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(.4); opacity: .4; }
  40% { transform: scale(1); opacity: 1; }
}

footer {
  background: white;
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  position: sticky;
  bottom: 0;
}
footer textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: .95rem;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 140px;
  min-height: 44px;
  line-height: 1.4;
}
footer textarea:focus { border-color: var(--primary); }
footer button {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 22px;
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  height: 44px;
  white-space: nowrap;
}
footer button:disabled { opacity: .5; cursor: not-allowed; }

.hint {
  text-align: center;
  color: var(--muted);
  font-size: .75rem;
  padding: 6px;
}

.error-banner {
  background: #fee2e2;
  color: #991b1b;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: .88rem;
  border-left: 4px solid #dc2626;
}
.error-banner code {
  background: rgba(0,0,0,.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: .85em;
}
</style>
</head>
<body>

<header>
  <div class="logo">🐑</div>
  <h1>Copiloto MilkyPot · Configuração</h1>
  <div class="status" id="status"><span class="dot"></span><span id="statusText">Conectando…</span></div>
</header>

<main id="main">
  <div class="welcome">
    <h2>Olá Jocimar! 👋</h2>
    <p>Sou seu copiloto pra configurar o sistema MilkyPot. Diferente da Belinha, eu <strong>escrevo direto no Firestore</strong> — atualizo produtos, preços, custos, configurações de franquia, e te mostro o que mudei.</p>
    <p style="font-size:.85rem;color:#888;margin-bottom:12px">💡 Exemplos pra começar:</p>
    <div class="examples">
      <button class="example" data-prompt="Lista as seções do meu catálogo">Listar seções do catálogo</button>
      <button class="example" data-prompt="Mostra todos os sabores que tenho">Ver todos os sabores</button>
      <button class="example" data-prompt="Quais foram os pedidos de hoje da Muffato Quintino?">Pedidos de hoje</button>
      <button class="example" data-prompt="Como tá o financeiro deste mês da Muffato Quintino?">DRE do mês</button>
      <button class="example" data-prompt="Quero aplicar +5% em todos os preços dos sabores">Reajuste +5% sabores</button>
      <button class="example" data-prompt="Cria um novo sabor: Brigadeiro Belga, R$ 14, descrição: brigadeiro fino com pedaços de chocolate belga">Criar novo sabor</button>
    </div>
  </div>
</main>

<footer>
  <textarea id="input" placeholder="Pergunta ou comando…  (Enter envia, Shift+Enter quebra linha)" rows="1"></textarea>
  <button id="sendBtn">Enviar</button>
</footer>

<!-- Firebase SDK pra ler tunnel URL+secret do Firestore quando estiver em milkypot.com -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const main = document.getElementById('main');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');

let conversation = [];
let API_URL = location.origin; // default: localhost
let API_SECRET = null;          // só usado quando vem via tunnel

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// Quando em milkypot.com, busca tunnel URL+secret do Firestore
async function resolveBackend() {
  if (isLocal) return { url: location.origin, secret: null };

  // Inicializa Firebase (mesmas credenciais do painel)
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyAbQ1fe0pK4prhfzYJypod2ie4DyNsq6BA",
      authDomain: "milkypot-ad945.firebaseapp.com",
      projectId: "milkypot-ad945"
    });
  }

  // Espera auth (super_admin já está logado no painel)
  const user = await new Promise(resolve => {
    const unsub = firebase.auth().onAuthStateChanged(u => { unsub(); resolve(u); });
  });
  if (!user) {
    throw new Error('Você precisa estar logado primeiro. <a href="/login.html" style="color:#7C3AED;font-weight:700">Clique aqui para fazer login →</a>');
  }

  // Força refresh do token para garantir claims atualizados (role: super_admin)
  try { await user.getIdToken(true); } catch(_) {}

  // Lê tunnel doc
  const doc = await firebase.firestore().collection('datastore').doc('copilot_tunnel').get();
  if (!doc.exists) throw new Error('Servidor local não está rodando. Inicie o <code>Copilot-Iniciar.bat</code> no PC.');
  const data = doc.data();
  if (!data.url || !data.secret) throw new Error('Tunnel mal configurado no Firestore.');

  // Verifica se está vivo
  try {
    const ping = await fetch(data.url + '/health', { method: 'GET' });
    if (!ping.ok) throw new Error();
  } catch (e) {
    throw new Error('Tunnel registrado mas não responde — verifique se o .bat está aberto no PC.');
  }
  return { url: data.url, secret: data.secret };
}

(async () => {
  try {
    const cfg = await resolveBackend();
    API_URL = cfg.url;
    API_SECRET = cfg.secret;

    const r = await fetch(API_URL + '/health');
    if (!r.ok) throw new Error();
    const d = await r.json();
    statusEl.classList.add('ok');
    const mode = isLocal ? 'local' : 'tunnel';
    statusText.textContent = `${d.tools.length} tools · ${mode} · ${d.firebase_project}`;
  } catch (e) {
    statusEl.classList.add('err');
    statusText.textContent = 'Servidor offline';
    let msg = e.message || 'O servidor local não está rodando. Execute <code>Copilot-Iniciar.bat</code> no PC.';
    // Mensagem amigável pra erro de permissão do Firestore
    if (msg.includes('permission') || msg.includes('insufficient') || msg.includes('PERMISSION_DENIED')) {
      msg = 'Sem permissão para ler as configurações do servidor. Você precisa estar logado como <strong>super_admin</strong>. <a href="/login.html" style="color:#991b1b;font-weight:700">Fazer login →</a>';
    }
    showError(msg);
  }
})();

function showError(html) {
  const div = document.createElement('div');
  div.className = 'error-banner';
  div.innerHTML = html;
  main.insertBefore(div, main.firstChild);
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="avatar">' + (role === 'user' ? '👤' : '🐑') + '</div><div class="bubble"></div>';
  div.querySelector('.bubble').textContent = text;
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
  return div;
}

function addTrace(trace) {
  const ok = !trace.output || !trace.output.error;
  const div = document.createElement('div');
  div.className = 'tool-trace ' + (ok ? 'ok' : 'err');
  div.innerHTML = `
    <div class="tool-head">${trace.tool}</div>
    <details>
      <summary>${ok ? 'sucesso' : 'erro'} — ver detalhes</summary>
      <pre>input: ${JSON.stringify(trace.input, null, 2)}</pre>
      <pre>output: ${JSON.stringify(trace.output, null, 2)}</pre>
    </details>
  `;
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="avatar">🐑</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
  return div;
}

async function send(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  conversation.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  const thinking = addThinking();

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (API_SECRET) headers['X-Copilot-Secret'] = API_SECRET;
    const r = await fetch(API_URL + '/chat', {
      method: 'POST',
      headers,
      body: JSON.stringify({ messages: conversation })
    });
    if (!r.ok) {
      const errTxt = await r.text();
      thinking.remove();
      addMsg('assistant', '❌ Erro: ' + errTxt);
      sendBtn.disabled = false;
      return;
    }
    const data = await r.json();
    thinking.remove();

    // Mostra traces
    (data.traces || []).forEach(addTrace);

    // Mostra resposta final
    addMsg('assistant', data.reply || '(sem resposta)');

    // Adiciona resposta na conversa pra continuidade
    conversation.push({ role: 'assistant', content: data.reply });
  } catch (e) {
    thinking.remove();
    addMsg('assistant', '❌ Erro de conexão: ' + e.message);
  }

  sendBtn.disabled = false;
  input.focus();
}

// Eventos
sendBtn.addEventListener('click', () => send(input.value));
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send(input.value);
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
document.querySelectorAll('.example').forEach(btn => {
  btn.addEventListener('click', () => send(btn.dataset.prompt));
});
input.focus();
</script>
</body>
</html>
