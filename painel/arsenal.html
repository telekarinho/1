// ========= PERSISTÊNCIA =========
function getStatus() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(_) { return {}; } }
function setStatus(id, s) {
    var d = getStatus(); d[id] = s;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(_){}
    renderAll();
}
function getToolStatus(t) {
    var s = getStatus();
    return s[t.id] || t.defaultStatus || 'inactive';
}

// ========= XP / LEVEL =========
function calcXp() {
    var totalXp = 0, activated = 0, mastered = 0;
    tools.forEach(function(t){
        var st = getToolStatus(t);
        if (st === 'active') { totalXp += t.xp; activated++; }
        if (st === 'mastered') { totalXp += t.xp * 2; activated++; mastered++; }
    });
    return { totalXp: totalXp, activated: activated, mastered: mastered };
}
function levelOf(xp) {
    if (xp >= 800) return { name: '👑 Lendário', color: '#FFD54F', max: 1000 };
    if (xp >= 500) return { name: '💎 Mestre', color: '#9C27B0', max: 800 };
    if (xp >= 250) return { name: '🚀 Veterano', color: '#42A5F5', max: 500 };
    if (xp >= 100) return { name: '⚡ Operador', color: '#10B981', max: 250 };
    return { name: '🌱 Iniciante', color: '#90A4AE', max: 100 };
}

// ========= ACHIEVEMENTS =========
function getAchievements() {
    var s = calcXp();
    return [
        { id: 'a1', name: '🌱 Primeiro Passo', desc: 'Ativou 1 ferramenta', unlocked: s.activated >= 1 },
        { id: 'a2', name: '🎯 Foco em Aquisição', desc: 'Ativou 3 ferramentas de aquisição', unlocked: tools.filter(function(t){return t.category==='aquisicao' && getToolStatus(t)!=='inactive';}).length >= 3 },
        { id: 'a3', name: '💰 Conversor', desc: 'Ativou todas conversão', unlocked: tools.filter(function(t){return t.category==='conversao' && getToolStatus(t)==='inactive';}).length === 0 },
        { id: 'a4', name: '🔁 Retenção Master', desc: 'MilkyClube + WhatsApp Lulu ativos', unlocked: getToolStatus(tools.find(function(t){return t.id==='milkyclube';}))!=='inactive' && getToolStatus(tools.find(function(t){return t.id==='whatsapp_lulu';}))!=='inactive' },
        { id: 'a5', name: '🚚 Delivery Ativo', desc: 'iFood + Uber Direct ativos', unlocked: getToolStatus(tools.find(function(t){return t.id==='ifood';}))!=='inactive' && getToolStatus(tools.find(function(t){return t.id==='uber_direct';}))!=='inactive' },
        { id: 'a6', name: '💎 5 Mestres', desc: 'Domina 5 ferramentas', unlocked: s.mastered >= 5 },
        { id: 'a7', name: '👑 Arsenal Completo', desc: 'Ativou todas 16 ferramentas', unlocked: s.activated === tools.length }
    ];
}

// ========= RENDER =========
var currentFilter = 'todas';

function renderHero() {
    var s = calcXp();
    var lvl = levelOf(s.totalXp);
    document.getElementById('playerLevel').textContent = lvl.name;
    document.getElementById('playerLevel').style.background = 'linear-gradient(135deg,'+lvl.color+',#fff)';
    document.getElementById('playerXp').textContent = s.totalXp + ' / ' + lvl.max;
    document.getElementById('toolsActivated').textContent = s.activated + ' / ' + tools.length;
    document.getElementById('toolsMastered').textContent = s.mastered;
    var pct = Math.min(100, (s.totalXp / lvl.max) * 100);
    document.getElementById('xpFill').style.width = pct + '%';
    document.getElementById('xpToNext').textContent = Math.max(0, lvl.max - s.totalXp) + ' XP pro próximo';
    var ach = getAchievements();
    document.getElementById('achievements').innerHTML = ach.map(function(a){
        return '<div class="achievement ' + (a.unlocked ? '' : 'locked') + '" title="' + a.desc + '">' + a.name + '</div>';
    }).join('');
}

function renderCard(t) {
    var st = getToolStatus(t);
    var statusLabel = st === 'active' ? '🚀 Ativada' : (st === 'mastered' ? '💎 Mestre' : '📦 Inativa');
    var nextStatus = st === 'inactive' ? 'active' : (st === 'active' ? 'mastered' : 'inactive');
    var nextLabel = st === 'inactive' ? '🚀 Marcar como Ativada' : (st === 'active' ? '💎 Sou Mestre' : '🔄 Resetar');
    var pageUrl = t.page.indexOf('http') === 0 ? t.page : t.page;
    return '<div class="tool-card status-' + st + '" data-cat="' + t.category + '" data-status="' + st + '">' +
        '<div class="tool-header">' +
            '<div class="tool-icon">' + t.icon + '</div>' +
            '<div class="tool-info">' +
                '<div class="tool-name">' + t.name + '</div>' +
                '<div class="tool-tagline">' + t.tagline + '</div>' +
                '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">' +
                    '<span class="tool-status">' + statusLabel + '</span>' +
                    '<span class="tool-xp">+' + t.xp + ' XP</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="tool-why">💡 ' + t.why + '</div>' +
        '<div class="tool-tutorial">' +
            '<h4>🚀 Como Usar (3 passos)</h4>' +
            '<ol>' +
                '<li>' + t.tutorial[0] + '</li>' +
                '<li>' + t.tutorial[1] + '</li>' +
                '<li>' + t.tutorial[2] + '</li>' +
            '</ol>' +
        '</div>' +
        '<div class="content-tabs">' +
            '<button class="content-tab active" data-tool="' + t.id + '" data-content="instagram">📸 IG</button>' +
            '<button class="content-tab" data-tool="' + t.id + '" data-content="tiktok">🎬 TikTok</button>' +
            '<button class="content-tab" data-tool="' + t.id + '" data-content="story">💬 Story</button>' +
            '<button class="content-tab" data-tool="' + t.id + '" data-content="whatsapp">📲 WhatsApp</button>' +
        '</div>' +
        '<div class="content-panel active" data-tool="' + t.id + '" data-content="instagram">' + esc(t.content.instagram) + '<br><button class="copy-btn" data-text="' + escAttr(t.content.instagram) + '">📋 Copiar</button></div>' +
        '<div class="content-panel" data-tool="' + t.id + '" data-content="tiktok">' + esc(t.content.tiktok) + '<br><button class="copy-btn" data-text="' + escAttr(t.content.tiktok) + '">📋 Copiar</button></div>' +
        '<div class="content-panel" data-tool="' + t.id + '" data-content="story">' + esc(t.content.story) + '<br><button class="copy-btn" data-text="' + escAttr(t.content.story) + '">📋 Copiar</button></div>' +
        '<div class="content-panel" data-tool="' + t.id + '" data-content="whatsapp">' + esc(t.content.whatsapp) + '<br><button class="copy-btn" data-text="' + escAttr(t.content.whatsapp) + '">📋 Copiar</button></div>' +
        '<div class="tool-actions">' +
            '<button class="btn-primary" data-action="status" data-tool="' + t.id + '" data-next="' + nextStatus + '">' + nextLabel + '</button>' +
            '<a class="btn-secondary" href="' + pageUrl + '"' + (pageUrl.indexOf('http') === 0 ? ' target="_blank"' : '') + '>🔧 Abrir Ferramenta</a>' +
        '</div>' +
    '</div>';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderGrid() {
    var f = currentFilter;
    var filtered = tools.filter(function(t){
        if (f === 'todas') return true;
        if (f === 'inativas') return getToolStatus(t) === 'inactive';
        if (f === 'ativas') return getToolStatus(t) === 'active';
        if (f === 'mestre') return getToolStatus(t) === 'mastered';
        return t.category === f;
    });
    document.getElementById('toolGrid').innerHTML = filtered.length ? filtered.map(renderCard).join('') :
        '<div style="grid-column:1/-1;padding:40px;text-align:center;opacity:.6">Nenhuma ferramenta neste filtro. Tenta outro.</div>';
    // Re-attach event handlers
    document.querySelectorAll('.content-tab').forEach(function(b){
        b.addEventListener('click', function(){
            var tid = b.dataset.tool, cid = b.dataset.content;
            document.querySelectorAll('[data-tool="' + tid + '"].content-tab').forEach(function(x){ x.classList.remove('active'); });
            document.querySelectorAll('[data-tool="' + tid + '"].content-panel').forEach(function(x){ x.classList.remove('active'); });
            b.classList.add('active');
            document.querySelector('.content-panel[data-tool="' + tid + '"][data-content="' + cid + '"]').classList.add('active');
        });
    });
    document.querySelectorAll('.copy-btn').forEach(function(b){
        b.addEventListener('click', function(){
            var t = b.dataset.text;
            navigator.clipboard.writeText(t).then(function(){
                var orig = b.textContent; b.textContent = '✓ Copiado!'; b.classList.add('copied');
                setTimeout(function(){ b.textContent = orig; b.classList.remove('copied'); }, 1800);
            });
        });
    });
    document.querySelectorAll('[data-action="status"]').forEach(function(b){
        b.addEventListener('click', function(){
            setStatus(b.dataset.tool, b.dataset.next);
        });
    });
}

function renderAll() { renderHero(); renderGrid(); }

document.querySelectorAll('.filter-btn').forEach(function(b){
    b.addEventListener('click', function(){
        document.querySelectorAll('.filter-btn').forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        currentFilter = b.dataset.filter;
        renderGrid();
    });
});

renderAll();

})();
