<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyPot - Gestão de Catálogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shared-panel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --mp-pink: #E91E63;
            --mp-purple: #9C27B0;
            --mp-bg: #F8F9FA;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 12px 12px 0 0;
            border: none;
            background: none;
            font-family: 'Baloo 2', cursive;
            font-size: 1rem;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--mp-pink);
            background: rgba(233, 30, 99, 0.05);
        }

        .tab-btn.active {
            color: var(--mp-pink);
            background: #fff;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--mp-pink);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card-item {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            position: relative;
            transition: transform 0.2s;
        }

        .card-item:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .card-emoji {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-family: 'Baloo 2', cursive;
            font-size: 1.15rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .card-price {
            font-weight: 800;
            color: var(--mp-pink);
            font-size: 1.1rem;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f5f5f5;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit { background: #E3F2FD; color: #1976D2; }
        .btn-delete { background: #FFEBEE; color: #D32F2F; }
        .btn-toggle { background: #F5F5F5; color: #666; }

        .btn-icon:hover { opacity: 0.8; transform: scale(1.05); }

        .btn-add-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--mp-pink);
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        .btn-add-float:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-unit { background: #E8F5E9; color: #2E7D32; }
        .badge-weight { background: #FFF3E0; color: #EF6C00; }
        .badge-inactive { background: #EEEEEE; color: #757575; }

        .portions-list {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .portion-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .btn-remove-p {
            background: none;
            border: none;
            color: #D32F2F;
            cursor: pointer;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="panel-layout">
    
    <!-- Sidebar será injetada por JS se necessário, ou fixa aqui -->
    <div id="sidebarMount"></div>

    <main class="panel-main">
        <header class="panel-header">
            <div class="header-info">
                <h1>🍨 Gestão de Catálogo</h1>
                <p>Configure o cardápio dinâmico para Loja e Delivery.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="CatalogManager.saveAll()">
                    <i class="fas fa-cloud-upload-alt"></i> Publicar Alterações
                </button>
            </div>
        </header>

        <div class="catalog-container">
            <nav class="tabs-nav" id="tabsNav">
                <button class="tab-btn active" data-tab="bases">Bases</button>
                <button class="tab-btn" data-tab="formatos">Formatos</button>
                <button class="tab-btn" data-tab="tamanhos">Tamanhos</button>
                <button class="tab-btn" data-tab="sabores">Sabores</button>
                <button class="tab-btn" data-tab="adicionais">Adicionais</button>
                <button class="tab-btn" data-tab="bebidas">Bebidas</button>
            </nav>

            <!-- Bases -->
            <div id="tab-bases" class="tab-content active">
                <div class="section-header">
                    <h2>Bases (Açaí, Ninho...)</h2>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('bases')">+ Nova Base</button>
                </div>
                <div class="grid-cards" id="grid-bases"></div>
            </div>

            <!-- Formatos -->
            <div id="tab-formatos" class="tab-content">
                <div class="section-header">
                    <h2>Formatos (Shake, Sundae...)</h2>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('formatos')">+ Novo Formato</button>
                </div>
                <div class="grid-cards" id="grid-formatos"></div>
            </div>

            <!-- Tamanhos -->
            <div id="tab-tamanhos" class="tab-content">
                <div class="section-header">
                    <h2>Tamanhos & Preços</h2>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('tamanhos')">+ Novo Tamanho</button>
                </div>
                <div class="grid-cards" id="grid-tamanhos"></div>
            </div>

            <!-- Sabores -->
            <div id="tab-sabores" class="tab-content">
                <div class="section-header">
                    <h2>Sabores por Categoria</h2>
                    <select id="flavorCategoryFilter" class="form-control" style="width: 200px;" onchange="CatalogManager.renderSabores()">
                        <!-- dinâmico -->
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('sabores')">+ Novo Sabor</button>
                </div>
                <div class="grid-cards" id="grid-sabores"></div>
            </div>

            <!-- Adicionais -->
            <div id="tab-adicionais" class="tab-content">
                <div class="section-header">
                    <h2>Adicionais & Complementos</h2>
                    <select id="extraCategoryFilter" class="form-control" style="width: 200px;" onchange="CatalogManager.renderAdicionais()">
                        <!-- dinâmico -->
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('adicionais')">+ Novo Adicional</button>
                </div>
                <div class="grid-cards" id="grid-adicionais"></div>
            </div>

            <!-- Bebidas -->
            <div id="tab-bebidas" class="tab-content">
                <div class="section-header">
                    <h2>Bebidas & Outros</h2>
                    <button class="btn btn-primary btn-sm" onclick="CatalogManager.showAddModal('bebidas')">+ Nova Bebida</button>
                </div>
                <div class="grid-cards" id="grid-bebidas"></div>
            </div>
        </div>
    </main>

    <!-- Modal Adicionar/Editar -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal-content">
            <h3 id="modalTitle">Editar Item</h3>
            <form id="catalogForm">
                <input type="hidden" id="edit-tab">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-category">

                <div class="form-row">
                    <div class="form-group">
                        <label>Nome do Item</label>
                        <input type="text" id="item-name" required>
                    </div>
                    <div class="form-group">
                        <label>Emoji/Ícone</label>
                        <input type="text" id="item-emoji" placeholder="🍨">
                    </div>
                </div>

                <div class="form-group" id="group-desc">
                    <label>Descrição Curta</label>
                    <textarea id="item-desc" rows="2"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de Venda</label>
                        <select id="item-typeVenda" onchange="CatalogManager.toggleWeightFields()">
                            <option value="unitario">Unitário (Preço Fixo)</option>
                            <option value="por_peso">Por Peso (kg)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Canal de Venda</label>
                        <select id="item-canalVenda">
                            <option value="ambos">Ambos (Loja + Delivery)</option>
                            <option value="loja">Só Loja</option>
                            <option value="delivery">Só Delivery</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Modo de Montagem</label>
                        <select id="item-modoMontagem">
                            <option value="montado">Copo Montado</option>
                            <option value="self_service">Self-Service / Peso Livre</option>
                            <option value="simples">Pronto (Picolé, Bebida)</option>
                        </select>
                    </div>
                    <div class="form-group" id="group-price">
                        <label id="label-price">Preço (R$)</label>
                        <input type="number" id="item-price" step="0.01" oninput="CatalogManager.updateMargin()">
                    </div>
                </div>

                <!-- NOVO: Custo + Comissão + Margem -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Custo (R$) <span style="font-size:11px;color:#888">— ingredientes/embalagem</span></label>
                        <input type="number" id="item-cost" step="0.01" min="0" value="0" oninput="CatalogManager.updateMargin()">
                    </div>
                    <div class="form-group">
                        <label>Comissão (%) <span style="font-size:11px;color:#888">— do atendente</span></label>
                        <input type="number" id="item-commission" step="0.1" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="form-group" id="margin-preview" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;">
                    <span id="marginValueLabel" style="color:#166534;font-weight:600">Margem: —</span>
                    <span style="color:#666;margin-left:8px" id="marginHelperText"></span>
                </div>

                <!-- Campos específicos para PESO -->
                <div id="weight-fields" style="display:none;">
                    <div class="form-group">
                        <label>Porções Fixas para Delivery (Configurável)</label>
                        <div class="portions-list" id="portions-list">
                            <!-- JS -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline" style="margin-top:5px" onclick="CatalogManager.addPortionRow()">+ Adicionar Porção</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Disponibilidade</label>
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer">
                        <input type="checkbox" id="item-available" checked style="width: auto"> Ativo no cardápio
                    </label>
                </div>

                <!-- RECEITA (BoM) — só pra itens que consomem insumos -->
                <div class="form-group" id="group-receita" style="background:#FFF7ED;border:1px solid #FDBA74;border-radius:12px;padding:14px;margin-top:14px">
                    <label style="display:flex;justify-content:space-between;align-items:center;font-size:.9rem;font-weight:700;color:#9A3412;margin-bottom:8px">
                        🧪 Receita (insumos necessários)
                        <button type="button" onclick="CatalogManager.addRecipeLine()" style="padding:6px 12px;font-size:12px;border:none;background:#EA580C;color:#fff;border-radius:8px;cursor:pointer;font-weight:700">+ Adicionar insumo</button>
                    </label>
                    <div id="recipeLines" style="display:flex;flex-direction:column;gap:8px"></div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px dashed #FDBA74;font-size:13px">
                        <span><b>Custo da receita:</b> <span id="recipeBaseCost" style="color:#9A3412;font-weight:700">R$ 0,00</span></span>
                        <span>
                            <label style="font-size:12px;color:#9A3412">Ajuste manual (R$):
                                <input type="number" step="0.01" id="item-costAdjust" value="0" oninput="CatalogManager.updateRecipeCost()" style="width:90px;padding:4px 8px;border:1px solid #FDBA74;border-radius:6px;margin-left:6px">
                            </label>
                        </span>
                    </div>
                    <div id="recipeWarning" style="margin-top:8px;font-size:12px;color:#9A3412;display:none"></div>
                </div>

                <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="CatalogManager.closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase compat para sincronizar com Firestore em tempo real -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="../js/core/constants.js"></script>
    <script src="../js/core/firebase-config.js"></script>
    <script src="../js/core/datastore.js"></script>
    <script src="../js/core/utils.js"></script>
    <script src="../js/core/audit.js"></script>
    <script src="../js/core/auth.js"></script>
    <script src="../js/core/units.js"></script>
    <script src="../js/core/recipes.js"></script>
    <!-- Seed fallback: CARDAPIO_CONFIG default se o Firestore estiver vazio -->
    <script src="../js/cardapio-data.js"></script>

    <script>
        const CatalogManager = {
            config: null,
            _initTries: 0,

            init() {
                this._initTries = (this._initTries || 0) + 1;
                // Inicializa DataStore (sync com Firestore) na primeira chamada
                if (this._initTries === 1 && typeof DataStore !== 'undefined' && DataStore.init) {
                    try { DataStore.init(); } catch(e) { console.warn('DataStore.init err:', e); }
                }

                // Carrega do DataStore (local)
                this.config = DataStore.get('catalog_config');

                // Se ainda nao tem local apos 2 tentativas e CARDAPIO_CONFIG existe, faz seed
                if (!this.config && this._initTries >= 3 && typeof CARDAPIO_CONFIG !== 'undefined') {
                    console.log('🌱 Seed local: usando CARDAPIO_CONFIG hardcoded como ponto de partida');
                    this.config = JSON.parse(JSON.stringify(CARDAPIO_CONFIG));
                    DataStore.set('catalog_config', this.config);
                }

                if (!this.config) {
                    // Ainda esperando sync do Firestore (ou DataStore inicializar)
                    if (this._initTries < 10) {
                        console.log('🔄 Aguardando catalog_config... tentativa ' + this._initTries);
                        setTimeout(() => this.init(), 500);
                    } else if (typeof CARDAPIO_CONFIG !== 'undefined') {
                        // Timeout final: usa hardcoded
                        this.config = JSON.parse(JSON.stringify(CARDAPIO_CONFIG));
                        DataStore.set('catalog_config', this.config);
                        this.setupEvents();
                        this.renderAll();
                        this.updateFilters();
                    } else {
                        alert('Catálogo vazio e sem fallback. Verifique sua conexão.');
                    }
                    return;
                }

                // Escuta atualizacoes externas (outras telas editando)
                window.addEventListener('mp_catalog_updated', (e) => {
                    if (e.detail) {
                        this.config = e.detail;
                        this.renderAll();
                    }
                });

                this.setupEvents();
                this.renderAll();
                this.updateFilters();
            },

            setupEvents() {
                // Tabs
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                    });
                });

                // Form Submit
                document.getElementById('catalogForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveItem();
                });
            },

            updateFilters() {
                // Categorias de sabores
                const sCat = document.getElementById('flavorCategoryFilter');
                sCat.innerHTML = Object.keys(this.config.sabores || {}).map(k => 
                    `<option value="${k}">${this.config.sabores[k].name}</option>`
                ).join('');

                // Categorias de adicionais
                const aCat = document.getElementById('extraCategoryFilter');
                aCat.innerHTML = Object.keys(this.config.adicionais || {}).map(k => 
                    `<option value="${k}">${this.config.adicionais[k].name}</option>`
                ).join('');
            },

            renderAll() {
                this.renderBases();
                this.renderFormatos();
                this.renderTamanhos();
                this.renderSabores();
                this.renderAdicionais();
                this.renderBebidas();
            },

            _createCard(item, tab, category = null) {
                const isWeight = item.tipoVenda === 'por_peso';
                const priceLabel = isWeight ? 'R$ ' + (item.price||0).toFixed(2) + '/kg' : 'R$ ' + (item.price||0).toFixed(2);
                const cost = Number(item.cost || 0);
                const price = Number(item.price || 0);
                let marginBlock = '';
                if (price > 0) {
                    const margin = price - cost;
                    const pct = (margin / price) * 100;
                    const color = pct >= 60 ? '#16a34a' : (pct >= 40 ? '#d97706' : '#dc2626');
                    marginBlock = `<div style="font-size:11px;color:${color};margin-top:4px"><b>Custo:</b> R$ ${cost.toFixed(2)} &middot; <b>Margem:</b> ${pct.toFixed(0)}%</div>`;
                }
                const commission = Number(item.commissionRate || 0);
                const commissionBlock = commission > 0 ? `<div style="font-size:11px;color:#7c3aed;margin-top:2px"><b>Comissão:</b> ${commission}%</div>` : '';
                const auditBlock = item.lastModifiedBy ? `<div style="font-size:10px;color:#bbb;margin-top:6px">atualizado por ${item.lastModifiedBy}</div>` : '';

                // Badge de receita (Etapa 2)
                let recipeBadgeBlock = '';
                if (window.Recipes && (tab === 'sabores' || tab === 'bebidas' || tab === 'adicionais')) {
                    const inv = this._loadInventory ? this._loadInventory() : [];
                    const b = window.Recipes.badge(item, inv);
                    recipeBadgeBlock = `<div style="display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${b.color}15;color:${b.color};border:1px solid ${b.color}40">${b.icon} ${b.label}</div>`;
                }

                return `
                    <div class="card-item ${!item.available ? 'inactive' : ''}">
                        <div class="card-header">
                            <div class="card-emoji">${item.emoji || '🍦'}</div>
                            <span class="badge ${isWeight ? 'badge-weight' : 'badge-unit'}">
                                ${isWeight ? 'POR PESO' : 'UNITÁRIO'}
                            </span>
                        </div>
                        <div class="card-title">${item.name}</div>
                        <div class="card-desc">${item.desc || ''}</div>
                        <div class="card-price">${priceLabel}</div>
                        ${marginBlock}
                        ${commissionBlock}
                        ${recipeBadgeBlock}
                        <div style="font-size: 10px; color: #999; margin-top: 5px;">
                            Canal: ${item.canalVenda || 'ambos'} | Modo: ${item.modoMontagem || 'montado'}
                        </div>
                        ${auditBlock}
                        <div class="card-actions">
                            <button class="btn-icon btn-edit" title="Editar" onclick="CatalogManager.showEditModal('${tab}', '${item.id}', '${category}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-icon btn-toggle" title="Ativo/Inativo" onclick="CatalogManager.toggleActive('${tab}', '${item.id}', '${category}')">
                                <i class="fas ${item.available ? 'fa-eye' : 'fa-eye-slash'}"></i>
                            </button>
                            <button class="btn-icon btn-delete" title="Excluir" onclick="CatalogManager.deleteItem('${tab}', '${item.id}', '${category}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            },

            renderBases() {
                const grid = document.getElementById('grid-bases');
                grid.innerHTML = (this.config.bases || []).map(b => this._createCard(b, 'bases')).join('');
            },

            renderFormatos() {
                const grid = document.getElementById('grid-formatos');
                grid.innerHTML = (this.config.formatos || []).map(f => this._createCard(f, 'formatos')).join('');
            },

            renderTamanhos() {
                const grid = document.getElementById('grid-tamanhos');
                grid.innerHTML = (this.config.tamanhos || []).map(t => this._createCard(t, 'tamanhos')).join('');
            },

            renderSabores() {
                const cat = document.getElementById('flavorCategoryFilter').value;
                const grid = document.getElementById('grid-sabores');
                if (!cat || !this.config.sabores[cat]) return;
                grid.innerHTML = (this.config.sabores[cat].items || []).map(s => this._createCard(s, 'sabores', cat)).join('');
            },

            renderAdicionais() {
                const cat = document.getElementById('extraCategoryFilter').value;
                const grid = document.getElementById('grid-adicionais');
                if (!cat || !this.config.adicionais[cat]) return;
                grid.innerHTML = (this.config.adicionais[cat].items || []).map(a => this._createCard(a, 'adicionais', cat)).join('');
            },

            renderBebidas() {
                const grid = document.getElementById('grid-bebidas');
                grid.innerHTML = (this.config.bebidas || []).map(b => this._createCard(b, 'bebidas')).join('');
            },

            // --- Lógica do Modal ---

            showAddModal(tab) {
                const catFilter = tab === 'sabores' ? 'flavorCategoryFilter' : 'extraCategoryFilter';
                const cat = (tab === 'sabores' || tab === 'adicionais') ? document.getElementById(catFilter).value : null;
                
                document.getElementById('edit-tab').value = tab;
                document.getElementById('edit-id').value = '';
                document.getElementById('edit-category').value = cat;
                document.getElementById('modalTitle').textContent = `Novo em ${tab}`;
                
                document.getElementById('catalogForm').reset();
                document.getElementById('portions-list').innerHTML = '';
                document.getElementById('item-cost').value = 0;
                document.getElementById('item-commission').value = 0;
                document.getElementById('item-costAdjust').value = 0;
                document.getElementById('recipeLines').innerHTML = '';
                this._recipeBuffer = [];
                this.updateRecipeCost();
                this.toggleWeightFields();
                this.updateMargin();

                document.getElementById('itemModal').classList.add('active');
            },

            showEditModal(tab, id, category) {
                let item;
                if (category && category !== 'null') {
                    item = this.config[tab][category].items.find(i => i.id === id);
                } else {
                    item = this.config[tab].find(i => i.id === id);
                }

                if (!item) return;

                document.getElementById('edit-tab').value = tab;
                document.getElementById('edit-id').value = id;
                document.getElementById('edit-category').value = category;
                document.getElementById('modalTitle').textContent = `Editar ${item.name}`;

                document.getElementById('item-name').value = item.name;
                document.getElementById('item-emoji').value = item.emoji || '';
                document.getElementById('item-desc').value = item.desc || '';
                document.getElementById('item-price').value = item.price || 0;
                document.getElementById('item-cost').value = item.cost || 0;
                document.getElementById('item-commission').value = item.commissionRate || 0;
                document.getElementById('item-typeVenda').value = item.tipoVenda || 'unitario';
                document.getElementById('item-canalVenda').value = item.canalVenda || 'ambos';
                document.getElementById('item-modoMontagem').value = item.modoMontagem || 'montado';
                document.getElementById('item-available').checked = item.available !== false;

                // Porções
                const pList = document.getElementById('portions-list');
                pList.innerHTML = '';
                if (item.porcoesDelivery) {
                    item.porcoesDelivery.forEach(p => this.addPortionRow(p.label, p.peso));
                }

                // Carrega receita do item (ou vazia)
                document.getElementById('item-costAdjust').value = item.costAdjust || 0;
                document.getElementById('recipeLines').innerHTML = '';
                this._recipeBuffer = (item.receita || []).map(function(r){ return Object.assign({}, r); });
                this._renderRecipeLines();
                this.updateRecipeCost();

                this.toggleWeightFields();
                this.updateMargin();
                document.getElementById('itemModal').classList.add('active');
            },

            _loadInventory() {
                var session = (typeof Auth !== 'undefined' && Auth.getSession) ? (Auth.getSession() || {}) : {};
                var fid = session.franchiseId || session.fid;
                if (!fid) return [];
                var inv = (DataStore.getCollection && DataStore.getCollection('inventory', fid)) || [];
                this._inventoryCache = inv;
                return inv;
            },

            _recipeBuffer: [],

            addRecipeLine() {
                this._recipeBuffer = this._recipeBuffer || [];
                this._recipeBuffer.push({ insumoId: '', qty: 0, unit: 'g' });
                this._renderRecipeLines();
            },

            removeRecipeLine(idx) {
                if (!this._recipeBuffer) return;
                this._recipeBuffer.splice(idx, 1);
                this._renderRecipeLines();
                this.updateRecipeCost();
            },

            _renderRecipeLines() {
                var container = document.getElementById('recipeLines');
                if (!container) return;
                var inv = this._loadInventory();
                var UNITS = (window.Units && window.Units.VALID_UNITS) || ['g','kg','ml','L','unid'];
                if (!this._recipeBuffer.length) {
                    container.innerHTML = '<div style="font-size:12px;color:#9A3412;opacity:.7;padding:6px 2px">Nenhum insumo cadastrado. Produto ficará marcado como <b>Receita pendente</b>.</div>';
                    return;
                }
                container.innerHTML = this._recipeBuffer.map(function(r, i){
                    var invOpts = '<option value="">— selecione —</option>' + inv.map(function(ii){
                        return '<option value="' + ii.id + '" data-unit="' + (ii.unit || '') + '" ' + (ii.id === r.insumoId ? 'selected' : '') + '>' + ii.name + ' (' + (ii.unit || '?') + ')</option>';
                    }).join('');
                    var unitOpts = UNITS.map(function(u){ return '<option ' + (u === r.unit ? 'selected' : '') + '>' + u + '</option>'; }).join('');
                    return '<div style="display:flex;gap:8px;align-items:center">' +
                        '<select onchange="CatalogManager._recipeField(' + i + ', \'insumoId\', this.value); CatalogManager._onInsumoChange(' + i + ', this);" style="flex:3;padding:6px 8px;border:1px solid #FDBA74;border-radius:6px;background:#fff">' + invOpts + '</select>' +
                        '<input type="number" step="0.01" min="0" value="' + (r.qty || 0) + '" onchange="CatalogManager._recipeField(' + i + ', \'qty\', parseFloat(this.value)||0)" placeholder="qty" style="flex:1;padding:6px 8px;border:1px solid #FDBA74;border-radius:6px;min-width:70px">' +
                        '<select onchange="CatalogManager._recipeField(' + i + ', \'unit\', this.value)" style="padding:6px 8px;border:1px solid #FDBA74;border-radius:6px;background:#fff">' + unitOpts + '</select>' +
                        '<button type="button" onclick="CatalogManager.removeRecipeLine(' + i + ')" style="padding:6px 10px;background:#fee;border:1px solid #FDBA74;color:#9A3412;border-radius:6px;cursor:pointer">✕</button>' +
                    '</div>';
                }).join('');
            },

            _recipeField(i, field, val) {
                if (!this._recipeBuffer || !this._recipeBuffer[i]) return;
                this._recipeBuffer[i][field] = val;
                this.updateRecipeCost();
            },

            // Ao escolher um insumo, sugere a unidade dele por padrao
            _onInsumoChange(i, selectEl) {
                var opt = selectEl.options[selectEl.selectedIndex];
                var unit = opt && opt.getAttribute('data-unit');
                if (unit && this._recipeBuffer[i] && !this._recipeBuffer[i].unit) {
                    this._recipeBuffer[i].unit = unit;
                    this._renderRecipeLines();
                }
            },

            updateRecipeCost() {
                var inv = this._loadInventory();
                var fakeItem = { receita: this._recipeBuffer || [] };
                var result = (window.Recipes && window.Recipes.calcRecipeCost) ? window.Recipes.calcRecipeCost(fakeItem, inv) : { cost: 0, valid: false };
                var label = document.getElementById('recipeBaseCost');
                if (label) label.textContent = 'R$ ' + (Number(result.cost) || 0).toFixed(2).replace('.', ',');

                var warn = document.getElementById('recipeWarning');
                if (warn) {
                    if (result.missing && result.missing.length) {
                        warn.style.display = 'block';
                        warn.innerHTML = '⚠ Insumo(s) não cadastrado(s) no estoque: <b>' + result.missing.join(', ') + '</b>. Cadastre em Produtos & Estoque.';
                    } else if (result.mismatches && result.mismatches.length) {
                        warn.style.display = 'block';
                        warn.innerHTML = '⚠ Unidade incompatível em algum insumo — revise';
                    } else { warn.style.display = 'none'; warn.innerHTML = ''; }
                }

                // Atualiza o campo "Custo" com (base + ajuste)
                var adjust = Number(document.getElementById('item-costAdjust')?.value || 0);
                var total = Math.round((result.cost + adjust) * 100) / 100;
                var costInput = document.getElementById('item-cost');
                if (costInput) costInput.value = total;
                this.updateMargin();
            },

            closeModal() {
                document.getElementById('itemModal').classList.remove('active');
            },

            toggleWeightFields() {
                const isWeight = document.getElementById('item-typeVenda').value === 'por_peso';
                document.getElementById('weight-fields').style.display = isWeight ? 'block' : 'none';
                document.getElementById('label-price').textContent = isWeight ? 'Preço por KG (R$)' : 'Preço Unitário (R$)';
            },

            addPortionRow(label = '', peso = '') {
                const div = document.createElement('div');
                div.className = 'portion-row';
                div.innerHTML = `
                    <input type="text" placeholder="Ex: 300g" value="${label}" style="flex:2">
                    <input type="number" placeholder="Peso (g)" value="${peso}" style="flex:1">
                    <button type="button" class="btn-remove-p" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
                `;
                document.getElementById('portions-list').appendChild(div);
            },

            saveItem() {
                // Coleta dados
                const tab = document.getElementById('edit-tab').value;
                const id = document.getElementById('edit-id').value;
                const category = document.getElementById('edit-category').value;

                const porcoes = [];
                document.querySelectorAll('.portion-row').forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs[0].value && inputs[1].value) {
                        porcoes.push({ label: inputs[0].value, peso: parseFloat(inputs[1].value) });
                    }
                });

                const existing = this._findItem(tab, id, category);
                const session = (typeof Auth !== 'undefined' && Auth.getSession) ? (Auth.getSession() || {}) : {};

                const item = {
                    id: id || Utils.generateId(),
                    name: document.getElementById('item-name').value,
                    emoji: document.getElementById('item-emoji').value,
                    desc: document.getElementById('item-desc').value,
                    price: parseFloat(document.getElementById('item-price').value || 0),
                    cost: parseFloat(document.getElementById('item-cost').value || 0),
                    commissionRate: parseFloat(document.getElementById('item-commission').value || 0),
                    tipoVenda: document.getElementById('item-typeVenda').value,
                    canalVenda: document.getElementById('item-canalVenda').value,
                    modoMontagem: document.getElementById('item-modoMontagem').value,
                    available: document.getElementById('item-available').checked,
                    porcoesDelivery: porcoes,
                    // Receita / BoM
                    receita: (this._recipeBuffer || []).filter(function(r){ return r.insumoId && r.qty > 0 && r.unit; }),
                    costAdjust: parseFloat(document.getElementById('item-costAdjust').value || 0),
                    // Auditoria
                    createdAt: existing && existing.createdAt ? existing.createdAt : new Date().toISOString(),
                    createdBy: existing && existing.createdBy ? existing.createdBy : (session.email || session.name || 'system'),
                    lastModifiedAt: new Date().toISOString(),
                    lastModifiedBy: session.email || session.name || 'system'
                };

                // Atualiza no config local
                if (!this.config[tab]) this.config[tab] = [];

                if (category && category !== 'null') {
                    const catItems = this.config[tab][category].items;
                    const idx = catItems.findIndex(i => i.id === item.id);
                    if (idx > -1) catItems[idx] = item;
                    else catItems.push(item);
                } else {
                    const idx = this.config[tab].findIndex(i => i.id === item.id);
                    if (idx > -1) this.config[tab][idx] = item;
                    else this.config[tab].push(item);
                }

                // Log audit
                AuditLog.log(id ? AuditLog.EVENTS.PRODUCT_UPDATED : AuditLog.EVENTS.PRODUCT_CREATED, {
                    name: item.name, tab, category, price: item.price, cost: item.cost
                });

                // Persiste imediatamente (nao precisa mais do botao "Salvar Todas")
                this._persist();
                this.renderAll();
                this.closeModal();
                if (typeof Utils !== 'undefined' && Utils.showToast) Utils.showToast('Item salvo', 'success');
            },

            // Helper: encontra item atual (pra preservar createdAt/createdBy)
            _findItem(tab, id, category) {
                if (!id) return null;
                if (category && category !== 'null' && this.config[tab] && this.config[tab][category]) {
                    return (this.config[tab][category].items || []).find(i => i.id === id);
                }
                return (this.config[tab] || []).find(i => i.id === id);
            },

            // Persiste imediatamente pra propagar pro cardapio publico + Firestore
            _persist() {
                DataStore.set('catalog_config', this.config);
                try {
                    window.dispatchEvent(new CustomEvent('mp_catalog_updated', { detail: this.config }));
                } catch(e) {}
            },

            // Atualiza preview de margem no formulario
            updateMargin() {
                const price = parseFloat(document.getElementById('item-price').value || 0);
                const cost  = parseFloat(document.getElementById('item-cost').value || 0);
                const label = document.getElementById('marginValueLabel');
                const helper = document.getElementById('marginHelperText');
                if (!label) return;
                if (!price || price <= 0) { label.textContent = 'Margem: —'; helper.textContent = ''; return; }
                const margin = price - cost;
                const pct = (margin / price) * 100;
                label.textContent = 'Margem: R$ ' + margin.toFixed(2) + '  (' + pct.toFixed(1) + '%)';
                if (pct < 40)      helper.textContent = '⚠ Margem baixa';
                else if (pct < 60) helper.textContent = 'Margem razoavel';
                else               helper.textContent = '✅ Margem saudavel';
            },

            deleteItem(tab, id, category) {
                if (!confirm('Tem certeza que deseja excluir permanentemente este item?')) return;

                if (category && category !== 'null') {
                    this.config[tab][category].items = this.config[tab][category].items.filter(i => i.id !== id);
                } else {
                    this.config[tab] = this.config[tab].filter(i => i.id !== id);
                }

                AuditLog.log(AuditLog.EVENTS.PRODUCT_TOGGLED, { action: 'delete', id, tab });
                this._persist();
                this.renderAll();
                if (typeof Utils !== 'undefined' && Utils.showToast) Utils.showToast('Item removido', 'success');
            },

            toggleActive(tab, id, category) {
                let item;
                if (category && category !== 'null') {
                    item = this.config[tab][category].items.find(i => i.id === id);
                } else {
                    item = this.config[tab].find(i => i.id === id);
                }
                if (item) {
                    const session = (typeof Auth !== 'undefined' && Auth.getSession) ? (Auth.getSession() || {}) : {};
                    item.available = !item.available;
                    item.lastModifiedAt = new Date().toISOString();
                    item.lastModifiedBy = session.email || session.name || 'system';
                    AuditLog.log(AuditLog.EVENTS.PRODUCT_TOGGLED, { action: item.available ? 'activate' : 'deactivate', id, tab });
                    this._persist();
                    this.renderAll();
                }
            },

            saveAll() {
                // Persiste no DataStore (ele vai levar pro Firebase)
                DataStore.set('catalog_config', this.config);
                if (typeof Utils !== 'undefined' && Utils.showToast) {
                    Utils.showToast('Catalogo salvo - propagado em tempo real', 'success');
                } else {
                    alert('🚀 Alterações salvas com sucesso!');
                }
            }
        };

        // Inicia
        window.addEventListener('load', () => CatalogManager.init());
    </script>
<script src="../js/core/copilot-transport.js" defer></script>
<script src="../js/pages/lilo-scanner.js" defer></script>
