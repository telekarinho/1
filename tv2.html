<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="robots" content="noindex, nofollow">
<title>MilkyPot TV 2</title>
<style>body{background:#000;color:#fff;font-family:sans-serif;text-align:center;padding-top:30vh;margin:0}</style>
<script>
(async function(){
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister().catch(()=>{})));
    }
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k).catch(()=>{})));
    }
  } catch(e){}
  location.replace('/tv.html?f=muffato-quintino&tv=tv_mo4mjace2aob&t=' + Date.now());
})();
</script>
</head><body><p>Carregando TV 2...</p></body></html>
