<!DOCTYPE html>
<html><head>

<title>MilkyPot TV 2</title>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(x => x.unregister())).catch(()=>{});

</script>
