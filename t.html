<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MilkyPot TV — Atalho</title>
  <style>
    html, body { height:100%; margin:0; background:#000; color:#fff; font-family:'Segoe UI',Tahoma,sans-serif; }
    .box { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; padding:20px; text-align:center; }
    h1 { font-size:22px; font-weight:700; margin:0; }
    p { opacity:.85; margin:0; font-size:14px; max-width:560px; line-height:1.5; }
    .ip { background:rgba(255,255,255,.08); padding:6px 12px; border-radius:8px; font-family:monospace; font-size:13px; }
    .spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,.15); border-top-color:#42A5F5; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .err { color:#EF4444; }
    .step { font-size:12px; opacity:.5; text-transform:uppercase; letter-spacing:1px; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="spinner"></div>
    <h1 id="msg">Carregando TV...</h1>
    <p id="sub" class="step">Resolvendo código</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/js/core/constants.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/datastore.js"></script>
  <script src="/js/core/firebase-config.js"></script>
  <script src="/js/core/adminconfig.js?v=mp-v13"></script>
  <script>
    (async function () {
      function show(html) { document.getElementById('box').innerHTML = html; }
      function setStep(s) { const el = document.getElementById('sub'); if (el) el.textContent = s; }
      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      // 1. Código da URL (tv1, tv2, etc)
      let code = null;
      const rawQs = location.search.substring(1);
      if (rawQs) {
        const params = new URLSearchParams(location.search);
        code = params.get('c');
        if (!code) {
          const first = rawQs.split('&')[0];
          if (first && !first.includes('=')) code = first;
        }
      }
      if (!code && location.hash) code = location.hash.replace('#', '');
      if (!code) {
        show('<h1 class="err">❌ Código ausente</h1><p>Use: <strong>milkypot.com/t?tv1</strong></p>');
        return;
      }
      code = String(code).toLowerCase().trim();

      // 2. Sincroniza dados do Firestore
      try {
        if (typeof DataStore !== 'undefined' && DataStore.init) DataStore.init();
        const db = firebase.firestore();
        await Promise.all([
          db.collection('datastore').doc('franchise_ips').get().then(d => {
            if (d.exists) localStorage.setItem('mp_franchise_ips', d.data().value || '{}');
          }).catch(()=>{}),
          db.collection('datastore').doc('franchises').get().then(d => {
            if (d.exists) localStorage.setItem('mp_franchises', d.data().value || '[]');
          }).catch(()=>{})
        ]);
      } catch (e) {}

      // 3. Descobre fid. Ordem (tudo automático, zero interação):
      //    (a) ?f=fid explícito
      //    (b) IP público bate com cadastrado
      //    (c) localStorage da TV já resolveu antes (mp_tv_last_fid)
      //    (d) só existe 1 franquia ativa → usa ela
      //    (e) código é único entre franquias → usa essa
      const params = new URLSearchParams(location.search);
      let fid = params.get('f') || null;
      let ip = null;

      if (!fid) {
        // IP público (2 serviços em cascata)
        try {
          const r = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
          if (r.ok) ip = (await r.json()).ip;
        } catch (e) {}
        if (!ip) {
          try {
            const r2 = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
            if (r2.ok) ip = (await r2.json()).ip;
          } catch (e) {}
        }
        if (ip && typeof AdminConfig !== 'undefined') {
          fid = AdminConfig.getFranchiseByIp(ip);
        }
      }

      // (c) memória local da TV — última franquia que resolveu esse code
      if (!fid) {
        fid = localStorage.getItem('mp_tv_last_fid') || null;
      }

      // (d) só 1 franquia ativa → usa ela (caso comum em rede nova)
      if (!fid) {
        const franchises = JSON.parse(localStorage.getItem('mp_franchises') || '[]')
          .filter(f => f && f.active !== false);
        if (franchises.length === 1) fid = franchises[0].id;
      }

      // (e) código é único globalmente → descobre franquia pela posse do code
      if (!fid) {
        try {
          const db = firebase.firestore();
          const snap = await db.collection('datastore').get();
          const matches = [];
          snap.forEach(doc => {
            if (doc.id.indexOf('tv_shortcodes_') !== 0) return;
            const map = JSON.parse(doc.data().value || '{}');
            if (map[code] && map[code].tvId) {
              matches.push({ fid: doc.id.replace('tv_shortcodes_', ''), tvId: map[code].tvId });
            }
          });
          if (matches.length === 1) {
            fid = matches[0].fid;
            // memoriza pra próxima vez
            localStorage.setItem('mp_tv_last_fid', fid);
            location.replace('/tv.html?f=' + encodeURIComponent(fid) + '&tv=' + encodeURIComponent(matches[0].tvId));
            return;
          }
        } catch (e) {}
      }

      if (!fid) {
        show(
          '<h1 class="err">⚠️ Rede não reconhecida</h1>' +
          '<p>Peça pro franqueado abrir <strong>milkypot.com/painel/tv-indoor.html</strong> na mesma rede desta TV uma única vez — o sistema registra o IP automaticamente.</p>' +
          (ip ? '<p class="ip">IP desta rede: ' + esc(ip) + '</p>' : '')
        );
        return;
      }

      // memoriza escolha pra próximos acessos rápidos
      localStorage.setItem('mp_tv_last_fid', fid);

      // 4. Carrega shortcodes da franquia resolvida
      setStep('Resolvendo código ' + code);
      try {
        const db = firebase.firestore();
        const d = await db.collection('datastore').doc('tv_shortcodes_' + fid).get();
        if (d.exists) localStorage.setItem('mp_tv_shortcodes_' + fid, d.data().value || '{}');
      } catch (e) {}

      let mapping = null;
      try {
        if (typeof AdminConfig !== 'undefined') mapping = AdminConfig.getTvShortcodeForFranchise(fid, code);
      } catch (e) {}

      if (!mapping || !mapping.tvId) {
        show(
          '<h1 class="err">❌ Código "' + esc(code) + '" não encontrado</h1>' +
          '<p>Peça pro franqueado cadastrar este atalho em <strong>milkypot.com/painel/tv-indoor.html</strong></p>' +
          '<p class="ip">Franquia: ' + esc(fid) + '</p>'
        );
        return;
      }

      location.replace('/tv.html?f=' + encodeURIComponent(fid) + '&tv=' + encodeURIComponent(mapping.tvId));
    })();
  </script>
</body>
</html>
