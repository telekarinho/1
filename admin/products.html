<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MilkyPot Admin - Cardápio</title>
<link rel="stylesheet" href="../css/shared-panel.css">
<style>
    body{background:#0f0c29;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{max-width:720px;width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px;text-align:center;backdrop-filter:blur(12px)}
    h1{font-size:28px;margin:0 0 8px;font-weight:800}
    p{opacity:.8;line-height:1.6;margin:0 0 16px;font-size:15px}
    .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.15);border-top-color:#42A5F5;border-radius:50%;animation:spin 1s linear infinite;margin:12px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .stack{display:flex;flex-direction:column;gap:10px;margin-top:20px}
    a.btn{display:inline-block;padding:14px 24px;background:#42A5F5;color:#fff;text-decoration:none;border-radius:12px;font-weight:700}
    a.btn.alt{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="wrap">
    <div style="font-size:48px;margin-bottom:8px">🔀</div>
    <h1>Cardápio unificado</h1>
    <p>A página <code>products.html</code> foi substituída. Agora existe um <b>editor único</b> que controla o cardápio público, PDV, painel do franqueado e APIs — com custos, comissões e auditoria.</p>
    <div class="spinner"></div>
    <p style="font-size:13px;opacity:.7">Redirecionando...</p>
    <div class="stack">
        <a class="btn" href="/painel/catalogo.html">Abrir Editor de Catálogo</a>
        <a class="btn alt" href="/admin/index.html">← Painel Admin</a>
    </div>
</div>

<script>
setTimeout(function(){ location.replace('/painel/catalogo.html'); }, 600);
</script>
</body>
</html>
