<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyPot Admin - Lançamento</title>
    <meta http-equiv="refresh" content="0; url=campaigns.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg-a:#fff6fb;
            --bg-b:#eef7ff;
            --card:#ffffffcc;
            --text:#5a4570;
            --muted:#8f83a3;
            --pink:#ff7eb6;
            --blue:#42a5f5;
            --border:#ffffffd9;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:24px;
            font-family:'Nunito',sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at top left, #ffd8ec 0, transparent 28%),
                radial-gradient(circle at bottom right, #d9f0ff 0, transparent 30%),
                linear-gradient(135deg, var(--bg-a), var(--bg-b));
        }
        .card{
            width:min(560px,100%);
            padding:32px;
            border-radius:32px;
            background:var(--card);
            border:1px solid var(--border);
            box-shadow:0 24px 60px rgba(103, 80, 164, 0.14);
            backdrop-filter:blur(14px);
            text-align:center;
        }
        .logo{
            width:96px;
            height:96px;
            object-fit:contain;
            margin-bottom:18px;
        }
        h1{
            margin:0 0 10px;
            font-family:'Baloo 2',cursive;
            font-size:clamp(2rem,5vw,3rem);
            line-height:1;
        }
        p{
            margin:0 0 22px;
            font-size:1rem;
            line-height:1.6;
            color:var(--muted);
        }
        .actions{
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:190px;
            padding:14px 20px;
            border-radius:999px;
            text-decoration:none;
            font-weight:800;
            transition:transform .18s ease, box-shadow .18s ease;
        }
        .btn:hover{transform:translateY(-1px)}
        .btn-primary{
            color:#fff;
            background:linear-gradient(135deg, var(--pink), var(--blue));
            box-shadow:0 14px 30px rgba(66,165,245,.24);
        }
        .btn-secondary{
            color:var(--text);
            background:#fff;
            border:1px solid #efe8f8;
        }
        .hint{
            margin-top:18px;
            font-size:.92rem;
        }
    </style>
</head>
<body>
    <main class="card">
        <img src="../images/logo-milkypot.png" alt="MilkyPot" class="logo">
        <h1>Área de Lançamento</h1>
        <p>Essa rota foi mantida por compatibilidade. Você está sendo direcionado para a central de campanhas do admin.</p>
        <div class="actions">
            <a href="campaigns.html" class="btn btn-primary">Abrir Campanhas</a>
            <a href="index.html" class="btn btn-secondary">Voltar ao Admin</a>
        </div>
        <p class="hint">Se o redirecionamento não acontecer automaticamente, use um dos botões acima.</p>
    </main>
    <script>
        setTimeout(function () {
            window.location.replace('campaigns.html');
        }, 120);
    </script>
</body>
</html>
